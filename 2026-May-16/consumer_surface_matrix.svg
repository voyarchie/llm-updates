<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Consumer and enterprise surface competition matrix between OpenAI and Anthropic, May 2026">
  <title>Consumer + Enterprise surface matrix, May 12 – 15 2026</title>
  <desc>Side-by-side matrix of where each lab shipped a customer-facing surface during the week of May 11 to May 15, 2026: ChatGPT Personal Finance with Plaid for OpenAI, Claude for Small Business + PwC alliance for Anthropic, and shared neutral pre-WWDC ground.</desc>
  <style>
    .frame   { fill: none; stroke: #94a3b8; stroke-width: 1; }
    .head    { fill: #1e293b; font: 600 14px ui-sans-serif, system-ui; }
    .sub     { fill: #475569; font: 11px ui-sans-serif, system-ui; }
    .openai  { fill: #14b8a6; }
    .anth    { fill: #f97316; }
    .neutral { fill: #6366f1; }
    .cell    { stroke-width: 1; }
    .cellLbl { fill: #0f172a; font: 600 12px ui-sans-serif, system-ui; }
    .cellSub { fill: #1e293b; font: 11px ui-sans-serif, system-ui; }
    .colHd   { fill: #f1f5f9; font: 600 13px ui-sans-serif, system-ui; }
    .title   { fill: #1e293b; font: 600 16px ui-sans-serif, system-ui; }
    @media (prefers-color-scheme: dark) {
      .head, .title, .sub { fill: #cbd5e1; }
      .cellLbl, .cellSub  { fill: #0f172a; }
    }
  </style>

  <!-- Title -->
  <text x="32" y="32" class="title">Surfaces that shipped this week (May 11 – 15, 2026)</text>
  <text x="32" y="52" class="sub">Both labs ship in three of four lanes; the absent cells say as much as the present ones.</text>

  <!-- Column headers -->
  <rect x="240" y="70" width="200" height="36" fill="#14b8a6" rx="6"/>
  <text x="340" y="93" class="colHd" text-anchor="middle">OpenAI</text>

  <rect x="450" y="70" width="200" height="36" fill="#f97316" rx="6"/>
  <text x="550" y="93" class="colHd" text-anchor="middle">Anthropic</text>

  <rect x="660" y="70" width="220" height="36" fill="#6366f1" rx="6"/>
  <text x="770" y="93" class="colHd" text-anchor="middle">Joint / pre-platform</text>

  <!-- Row 1: Consumer chat -->
  <text x="32" y="142" class="head">Consumer chat</text>
  <text x="32" y="158" class="sub">individual user surface</text>

  <rect x="240" y="120" width="200" height="60" class="cell" fill="#ccfbf1" stroke="#14b8a6" rx="6"/>
  <text x="252" y="142" class="cellLbl">ChatGPT Personal Finance</text>
  <text x="252" y="158" class="cellSub">+ Plaid, 12,000 banks (May 15)</text>
  <text x="252" y="172" class="cellSub">Pro-only preview, US-only</text>

  <rect x="450" y="120" width="200" height="60" class="cell" fill="#ffedd5" stroke="#f97316" rx="6"/>
  <text x="462" y="142" class="cellLbl">(no consumer move</text>
  <text x="462" y="158" class="cellSub">this week)</text>
  <text x="462" y="172" class="cellSub">last: Claude.ai usage +50%</text>

  <rect x="660" y="120" width="220" height="60" class="cell" fill="#e0e7ff" stroke="#6366f1" rx="6"/>
  <text x="672" y="142" class="cellLbl">iOS 27 Extensions (queued)</text>
  <text x="672" y="158" class="cellSub">WWDC June 8 reveals routing</text>

  <!-- Row 2: SMB / Vertical -->
  <text x="32" y="222" class="head">SMB / vertical</text>
  <text x="32" y="238" class="sub">in-tool integrations</text>

  <rect x="240" y="200" width="200" height="60" class="cell" fill="#ccfbf1" stroke="#14b8a6" rx="6"/>
  <text x="252" y="222" class="cellLbl">(no SMB SKU this week)</text>
  <text x="252" y="238" class="cellSub">DeployCo serves Fortune 500</text>
  <text x="252" y="252" class="cellSub">first; SMB lane wide open</text>

  <rect x="450" y="200" width="200" height="60" class="cell" fill="#ffedd5" stroke="#f97316" rx="6"/>
  <text x="462" y="222" class="cellLbl">Claude for Small Business</text>
  <text x="462" y="238" class="cellSub">QuickBooks, PayPal, HubSpot</text>
  <text x="462" y="252" class="cellSub">+ Roadshow (Chicago May 14)</text>

  <rect x="660" y="200" width="220" height="60" class="cell" fill="#e0e7ff" stroke="#6366f1" rx="6"/>
  <text x="672" y="222" class="cellLbl">Microsoft Agent 365 GA</text>
  <text x="672" y="238" class="cellSub">$15/user/month control plane</text>
  <text x="672" y="252" class="cellSub">across vendors (May 1)</text>

  <!-- Row 3: Services / SI -->
  <text x="32" y="302" class="head">Services / SI</text>
  <text x="32" y="318" class="sub">deployment chassis</text>

  <rect x="240" y="280" width="200" height="60" class="cell" fill="#ccfbf1" stroke="#14b8a6" rx="6"/>
  <text x="252" y="302" class="cellLbl">DeployCo + Tomoro FDEs</text>
  <text x="252" y="318" class="cellSub">$14B post-money</text>
  <text x="252" y="332" class="cellSub">McKinsey · Bain · Capgemini LP</text>

  <rect x="450" y="280" width="200" height="60" class="cell" fill="#ffedd5" stroke="#f97316" rx="6"/>
  <text x="462" y="302" class="cellLbl">PwC × Claude expansion</text>
  <text x="462" y="318" class="cellSub">30,000 PwC staff trained</text>
  <text x="462" y="332" class="cellSub">new Office-of-CFO unit</text>

  <rect x="660" y="280" width="220" height="60" class="cell" fill="#e0e7ff" stroke="#6366f1" rx="6"/>
  <text x="672" y="302" class="cellLbl">Accenture / Deloitte: silent</text>
  <text x="672" y="318" class="cellSub">no JV announcement yet</text>
  <text x="672" y="332" class="cellSub">3-week response window</text>

  <!-- Row 4: Capital / Compute -->
  <text x="32" y="382" class="head">Capital / compute</text>
  <text x="32" y="398" class="sub">balance sheet flag</text>

  <rect x="240" y="360" width="200" height="60" class="cell" fill="#ccfbf1" stroke="#14b8a6" rx="6"/>
  <text x="252" y="382" class="cellLbl">CFO signals new raise</text>
  <text x="252" y="398" class="cellSub">"vertical wall of demand"</text>
  <text x="252" y="412" class="cellSub">last raise: $122B @ $852B</text>

  <rect x="450" y="360" width="200" height="60" class="cell" fill="#ffedd5" stroke="#f97316" rx="6"/>
  <text x="462" y="382" class="cellLbl">$30B round @ $900B (May 12)</text>
  <text x="462" y="398" class="cellSub">Dragoneer · Greenoaks ·</text>
  <text x="462" y="412" class="cellSub">Sequoia · Altimeter co-lead</text>

  <rect x="660" y="360" width="220" height="60" class="cell" fill="#e0e7ff" stroke="#6366f1" rx="6"/>
  <text x="672" y="382" class="cellLbl">Compute is the constraint</text>
  <text x="672" y="398" class="cellSub">5 GW Google TPU (Anthropic)</text>
  <text x="672" y="412" class="cellSub">SpaceX Colossus 1 (Anthropic)</text>

  <!-- Bottom rule -->
  <line x1="32" y1="450" x2="868" y2="450" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="32" y="468" class="sub">Empty cells (consumer chat for Anthropic; SMB for OpenAI) are the open recruiting questions for the next two weeks.</text>
</svg>

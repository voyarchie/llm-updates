<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Anthropic compute capacity, May 6 2026</title>
  <desc>Stacked bars showing the 300 MW / ~220k GPU step-change from the SpaceX Colossus 1 deal versus prior Anthropic compute partners.</desc>

  <style>
    .bg { fill: none; }
    .axis { stroke: #94a3b8; stroke-width: 1; }
    .grid { stroke: #94a3b8; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.5; }
    .label { fill: #475569; font-size: 12px; }
    .tick { fill: #475569; font-size: 11px; }
    .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
    .sub { font-size: 12px; fill: #475569; }
    .a-bar { fill: #38bdf8; }
    .b-bar { fill: #a78bfa; }
    .c-bar { fill: #fb923c; }
    .d-bar { fill: #f472b6; }
    .new-bar { fill: #34d399; stroke: #047857; stroke-width: 2; }
    .bar-label { fill: #0f172a; font-size: 12px; font-weight: 600; }
    .legend { font-size: 12px; fill: #334155; }
    @media (prefers-color-scheme: dark) {
      .label, .tick, .legend { fill: #cbd5e1; }
      .title { fill: #f1f5f9; }
      .sub { fill: #cbd5e1; }
      .axis { stroke: #475569; }
      .grid { stroke: #475569; }
      .bar-label { fill: #f1f5f9; }
    }
  </style>

  <rect class="bg" width="880" height="460"/>

  <text class="title" x="40" y="36">Anthropic dedicated compute, by partner — capacity step on May 6</text>
  <text class="sub"   x="40" y="56">Reported peak provisioning, megawatts. Sources: CNBC, Bloomberg, Axios, xAI press release.</text>

  <!-- chart frame -->
  <g transform="translate(80,90)">
    <!-- y axis -->
    <line class="axis" x1="0" y1="0" x2="0" y2="300"/>
    <!-- x axis -->
    <line class="axis" x1="0" y1="300" x2="720" y2="300"/>

    <!-- gridlines + ticks (0 .. 1000 MW) -->
    <g>
      <line class="grid" x1="0" y1="270" x2="720" y2="270"/>
      <line class="grid" x1="0" y1="240" x2="720" y2="240"/>
      <line class="grid" x1="0" y1="210" x2="720" y2="210"/>
      <line class="grid" x1="0" y1="180" x2="720" y2="180"/>
      <line class="grid" x1="0" y1="150" x2="720" y2="150"/>
      <line class="grid" x1="0" y1="120" x2="720" y2="120"/>
      <line class="grid" x1="0" y1="90"  x2="720" y2="90"/>
      <line class="grid" x1="0" y1="60"  x2="720" y2="60"/>
      <line class="grid" x1="0" y1="30"  x2="720" y2="30"/>

      <text class="tick" x="-8" y="304" text-anchor="end">0</text>
      <text class="tick" x="-8" y="244" text-anchor="end">200</text>
      <text class="tick" x="-8" y="184" text-anchor="end">400</text>
      <text class="tick" x="-8" y="124" text-anchor="end">600</text>
      <text class="tick" x="-8" y="64"  text-anchor="end">800</text>
      <text class="tick" x="-8" y="4"   text-anchor="end">1000 MW</text>
    </g>

    <!-- existing partners -->
    <!-- AWS Trainium (Project Rainier estimate, ~700 MW share) -->
    <rect class="a-bar" x="40"  y="90"  width="80" height="210"/>
    <text class="bar-label" x="80" y="80" text-anchor="middle">AWS Trainium</text>
    <text class="tick" x="80" y="316" text-anchor="middle">~700 MW</text>

    <!-- Google TPU (multi-region capacity) -->
    <rect class="b-bar" x="160" y="120" width="80" height="180"/>
    <text class="bar-label" x="200" y="110" text-anchor="middle">Google TPU</text>
    <text class="tick" x="200" y="316" text-anchor="middle">~600 MW est.</text>

    <!-- Oracle / Microsoft co-tenant -->
    <rect class="c-bar" x="280" y="210" width="80" height="90"/>
    <text class="bar-label" x="320" y="200" text-anchor="middle">Oracle / Azure</text>
    <text class="tick" x="320" y="316" text-anchor="middle">~300 MW est.</text>

    <!-- New: SpaceX Colossus 1 -->
    <rect class="new-bar" x="400" y="210" width="80" height="90"/>
    <text class="bar-label" x="440" y="200" text-anchor="middle">SpaceX Colossus 1</text>
    <text class="tick" x="440" y="316" text-anchor="middle">300 MW (new May 6)</text>

    <!-- combined arrow -->
    <line x1="400" y1="195" x2="480" y2="195" stroke="#047857" stroke-width="2"/>
    <text class="bar-label" x="440" y="186" text-anchor="middle" fill="#047857">+220k NVIDIA GPUs in &lt;30 days</text>

    <!-- subscriber-impact callout -->
    <g transform="translate(540, 60)">
      <rect x="0" y="0" width="170" height="190" rx="10" ry="10" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <text class="bar-label" x="85" y="22" text-anchor="middle">Direct user impact</text>
      <text class="legend" x="12" y="48">• Claude Pro / Max:</text>
      <text class="legend" x="22" y="64">2× rate limits</text>
      <text class="legend" x="12" y="86">• Pro / Max peak-hour</text>
      <text class="legend" x="22" y="102">throttle removed</text>
      <text class="legend" x="12" y="124">• Opus API tier:</text>
      <text class="legend" x="22" y="140">large limit raise</text>
      <text class="legend" x="12" y="162">• Optionality on</text>
      <text class="legend" x="22" y="178">multi-GW orbital</text>
    </g>
  </g>

  <!-- legend at bottom -->
  <g transform="translate(80, 420)">
    <rect class="a-bar"   x="0"   y="-10" width="14" height="14"/>
    <text class="legend"  x="20"  y="2">AWS</text>

    <rect class="b-bar"   x="80"  y="-10" width="14" height="14"/>
    <text class="legend"  x="100" y="2">Google</text>

    <rect class="c-bar"   x="180" y="-10" width="14" height="14"/>
    <text class="legend"  x="200" y="2">Oracle/Azure</text>

    <rect class="new-bar" x="320" y="-10" width="14" height="14"/>
    <text class="legend"  x="340" y="2">SpaceX (new May 6)</text>
  </g>
</svg>

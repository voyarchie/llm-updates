<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Leaked Gemini 3.2 Flash pricing vs. existing Gemini Flash tier">
  <title>Gemini Flash tier pricing — leaked 3.2 vs. 3.x</title>
  <desc>Leaked Gemini 3.2 Flash input price is $0.25 per million tokens and output price is $2.00 per million tokens. Gemini 3.1 Flash Lite is priced at $0.25 input / $1.50 output. Gemini 3 Flash sits at $0.50 input / $3.00 output. Numbers from AI Studio metadata leaks; not yet officially announced.</desc>

  <style>
    .axis      { stroke: #94a3b8; stroke-width: 1.5; }
    .grid      { stroke: #94a3b8; stroke-width: 0.5; stroke-dasharray: 2 3; opacity: 0.6; }
    .axis-text { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #64748b; }
    .axis-title{ font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
    .title     { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #334155; }
    .subtitle  { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #64748b; }
    .bar-label { font: 600 11px ui-sans-serif, system-ui, sans-serif; }
    .ink       { fill: #0f172a; }

    .input-bar  { fill: #38bdf8; }
    .output-bar { fill: #a78bfa; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="title">Leaked Gemini 3.2 Flash pricing vs. peers</text>
  <text x="360" y="46" text-anchor="middle" class="subtitle">USD per 1M tokens · AI Studio metadata, pre-I/O 2026</text>

  <!-- Y axis: $0 to $3.50 -->
  <line x1="70" y1="80" x2="70" y2="290" class="axis"/>
  <line x1="70" y1="290" x2="690" y2="290" class="axis"/>

  <!-- gridlines + Y labels -->
  <g>
    <line x1="70" y1="290" x2="690" y2="290" class="grid"/>
    <line x1="70" y1="248" x2="690" y2="248" class="grid"/>
    <line x1="70" y1="206" x2="690" y2="206" class="grid"/>
    <line x1="70" y1="164" x2="690" y2="164" class="grid"/>
    <line x1="70" y1="122" x2="690" y2="122" class="grid"/>
    <line x1="70" y1="80"  x2="690" y2="80"  class="grid"/>
    <text x="64" y="294" text-anchor="end" class="axis-text">$0</text>
    <text x="64" y="252" text-anchor="end" class="axis-text">$0.75</text>
    <text x="64" y="210" text-anchor="end" class="axis-text">$1.50</text>
    <text x="64" y="168" text-anchor="end" class="axis-text">$2.25</text>
    <text x="64" y="126" text-anchor="end" class="axis-text">$3.00</text>
    <text x="64" y="84"  text-anchor="end" class="axis-text">$3.75</text>
  </g>
  <text x="24" y="195" transform="rotate(-90 24 195)" class="axis-title">USD per 1M tokens</text>

  <!-- Helper: each bar height = price * 56 px per $1, baseline y=290 -->

  <!-- Group 1: Gemini 3 Flash -->
  <g>
    <!-- input $0.50 -> 28 px -->
    <rect x="120" y="262" width="44" height="28" class="input-bar"/>
    <text x="142" y="258" text-anchor="middle" class="bar-label ink">$0.50</text>
    <!-- output $3.00 -> 168 px -->
    <rect x="166" y="122" width="44" height="168" class="output-bar"/>
    <text x="188" y="118" text-anchor="middle" class="bar-label ink">$3.00</text>
    <text x="165" y="310" text-anchor="middle" class="axis-title">Gemini 3 Flash</text>
    <text x="165" y="325" text-anchor="middle" class="subtitle">released Jan 2026</text>
  </g>

  <!-- Group 2: Gemini 3.1 Flash Lite -->
  <g>
    <!-- input $0.25 -> 14 px -->
    <rect x="300" y="276" width="44" height="14" class="input-bar"/>
    <text x="322" y="272" text-anchor="middle" class="bar-label ink">$0.25</text>
    <!-- output $1.50 -> 84 px -->
    <rect x="346" y="206" width="44" height="84" class="output-bar"/>
    <text x="368" y="202" text-anchor="middle" class="bar-label ink">$1.50</text>
    <text x="345" y="310" text-anchor="middle" class="axis-title">3.1 Flash Lite</text>
    <text x="345" y="325" text-anchor="middle" class="subtitle">May 8, 2026</text>
  </g>

  <!-- Group 3: Gemini 3.2 Flash (leaked) -->
  <g>
    <!-- input $0.25 -> 14 px -->
    <rect x="480" y="276" width="44" height="14" class="input-bar"/>
    <text x="502" y="272" text-anchor="middle" class="bar-label ink">$0.25</text>
    <!-- output $2.00 -> 112 px -->
    <rect x="526" y="178" width="44" height="112" class="output-bar"/>
    <text x="548" y="174" text-anchor="middle" class="bar-label ink">$2.00</text>
    <text x="525" y="310" text-anchor="middle" class="axis-title">3.2 Flash (leak)</text>
    <text x="525" y="325" text-anchor="middle" class="subtitle">I/O 2026, May 19–20</text>
  </g>

  <!-- Legend -->
  <g transform="translate(530,72)">
    <rect width="14" height="14" rx="2" class="input-bar"/>
    <text x="22" y="11" class="subtitle">Input / 1M</text>
    <rect x="90" width="14" height="14" rx="2" class="output-bar"/>
    <text x="112" y="11" class="subtitle">Output / 1M</text>
  </g>
</svg>

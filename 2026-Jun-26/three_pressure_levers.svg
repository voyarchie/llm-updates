<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 770 432" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Three independent pressure levers now bear on the Fable 5 / Mythos 5 export directive, and the three dated markers ahead">
  <title>By Day 14 the directive faces three independent levers &#8212; scholarly legality, a customer lawsuit, and a congressional deadline due today &#8212; while the facts on the ground (zero traffic) are unchanged.</title>

  <text x="20" y="30" font-size="19" font-weight="700" fill="#64748b">Day 14: three levers on the directive, none of them new traffic</text>
  <text x="20" y="52" font-size="13" fill="#94a3b8">The order still stands and Anthropic serves zero Fable 5 / Mythos 5 traffic. What moved since Thursday is the pressure around it.</text>

  <!-- Lever 1: scholarly legality -->
  <rect x="20" y="76" width="230" height="92" rx="4" fill="#1e3a8a" stroke="#1e293b" stroke-width="1"/>
  <text x="34" y="98" font-size="13" font-weight="700" fill="#dbeafe">1 &#183; Scholarly (legality)</text>
  <text x="34" y="118" font-size="11.5" fill="#dbeafe">Just Security, CSIS, IAPP, Lawfare</text>
  <text x="34" y="134" font-size="11.5" fill="#dbeafe">question whether EAR &#167;744.22 or</text>
  <text x="34" y="150" font-size="11.5" fill="#dbeafe">IEEPA can reach a hosted model.</text>
  <text x="34" y="163" font-size="10.5" fill="#93c5fd">logged Jun&#8209;25</text>

  <!-- Lever 2: judicial -->
  <rect x="270" y="76" width="230" height="92" rx="4" fill="#1e3a8a" stroke="#1e293b" stroke-width="1"/>
  <text x="284" y="98" font-size="13" font-weight="700" fill="#dbeafe">2 &#183; Judicial (a customer)</text>
  <text x="284" y="118" font-size="11.5" fill="#dbeafe">A paying customer sues the US</text>
  <text x="284" y="134" font-size="11.5" fill="#dbeafe">over lost Fable 5 access &#8212; the</text>
  <text x="284" y="150" font-size="11.5" fill="#dbeafe">first private legal challenge.</text>
  <text x="284" y="163" font-size="10.5" fill="#93c5fd">Bloomberg, Jun&#8209;23</text>

  <!-- Lever 3: legislative (today) -->
  <rect x="520" y="76" width="230" height="92" rx="4" fill="#9a3412" stroke="#7c2d12" stroke-width="1"/>
  <text x="534" y="98" font-size="13" font-weight="700" fill="#fed7aa">3 &#183; Legislative (today)</text>
  <text x="534" y="118" font-size="11.5" fill="#fed7aa">Four members of Congress gave</text>
  <text x="534" y="134" font-size="11.5" fill="#fed7aa">Sec. Lutnick until Jun&#8209;26 to</text>
  <text x="534" y="150" font-size="11.5" fill="#fed7aa">explain the ban in writing.</text>
  <text x="534" y="163" font-size="10.5" fill="#fdba74">deadline arrives Jun&#8209;26</text>

  <!-- converge arrows -->
  <line x1="135" y1="168" x2="135" y2="192" stroke="#94a3b8" stroke-width="2"/>
  <line x1="385" y1="168" x2="385" y2="192" stroke="#94a3b8" stroke-width="2"/>
  <line x1="635" y1="168" x2="635" y2="192" stroke="#94a3b8" stroke-width="2"/>
  <line x1="135" y1="192" x2="635" y2="192" stroke="#94a3b8" stroke-width="2"/>
  <line x1="385" y1="192" x2="385" y2="206" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="381,206 389,206 385,216" fill="#94a3b8"/>

  <rect x="150" y="216" width="470" height="46" rx="4" fill="#475569" stroke="#1e293b" stroke-width="1"/>
  <text x="385" y="237" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Net effect on the facts: none. Still Day 14, still zero traffic.</text>
  <text x="385" y="254" font-size="12" fill="#e2e8f0" text-anchor="middle">Pressure is building on three fronts at once; the directive has not moved.</text>

  <!-- timeline -->
  <text x="20" y="296" font-size="13" font-weight="700" fill="#64748b">The three dated markers ahead</text>
  <line x1="60" y1="338" x2="710" y2="338" stroke="#94a3b8" stroke-width="2"/>

  <circle cx="120" cy="338" r="7" fill="#9a3412" stroke="#7c2d12" stroke-width="1.5"/>
  <text x="120" y="320" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">Jun&#8209;26</text>
  <text x="120" y="362" font-size="11" fill="#94a3b8" text-anchor="middle">Congressional</text>
  <text x="120" y="376" font-size="11" fill="#94a3b8" text-anchor="middle">explanation due</text>

  <circle cx="385" cy="338" r="7" fill="#1e3a8a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="385" y="320" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">Jul&#8209;8</text>
  <text x="385" y="362" font-size="11" fill="#94a3b8" text-anchor="middle">Gov-ID verification</text>
  <text x="385" y="376" font-size="11" fill="#94a3b8" text-anchor="middle">goes live (US-first path)</text>

  <circle cx="650" cy="338" r="7" fill="#15803d" stroke="#14532d" stroke-width="1.5"/>
  <text x="650" y="320" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">Aug&#8209;1</text>
  <text x="650" y="362" font-size="11" fill="#94a3b8" text-anchor="middle">EO 60-day frontier</text>
  <text x="650" y="376" font-size="11" fill="#94a3b8" text-anchor="middle">framework deadline</text>

  <text x="20" y="408" font-size="11" fill="#94a3b8">Levers 1&#8211;2 push on the order's authority and add a private plaintiff; lever 3 adds legislative oversight. All three are about the ban's *basis*, not its facts.</text>
  <text x="20" y="426" font-size="11" fill="#94a3b8">Sources: Bloomberg (Jun&#8209;23); coverage of the Jun&#8209;18 congressional letter to Commerce; Anthropic statements (Jun&#8209;25). Prediction markets ~flat vs Jun&#8209;24.</text>
</svg>

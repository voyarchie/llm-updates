<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Scatter plot of Artificial Analysis Intelligence Index (horizontal, 38 to 62) against output price in dollars per million tokens (vertical, 0 to 55) for six models, July 2026. Two open-weights models in teal: Inkling at Index 41 and about 4.68 dollars, and Kimi K3 at Index 57 and 15 dollars. Four closed models in slate-blue: Muse Spark 1.1 at Index 51 and 4.25 dollars, Grok 4.5 at Index 54 and 6 dollars, GPT-5.6 Sol at Index 58.9 and 30 dollars, and Claude Fable 5 at Index 59.9 and 50 dollars. The closed frontier models climb steeply in price as Index rises, while the two open models anchor opposite ends of the Index range at low price. Gemini 3.5 Pro is marked absent, unscored and unpriced.">
  <title>The open-weights axis has two poles: cheap-mid (Inkling) and near-frontier (Kimi K3)</title>

  <!-- theme-neutral palette: saturated fills carry white text on light and dark; slate labels/axis read on both -->
  <text x="24" y="30" font-size="19" font-weight="700" fill="#64748b">Two poles of open weights vs. the closed price curve</text>
  <text x="24" y="50" font-size="12.5" fill="#94a3b8">Intelligence Index (higher = smarter) vs. output price $/Mtok (lower = cheaper). Independent Index figures, July 2026.</text>

  <!-- plot frame: x 100..820 maps Index 38..62 -> x(v)=100+(v-38)*30 ; y 60..380 maps $0..$55 -> y($)=380-$*5.818 -->
  <line x1="100" y1="60" x2="100" y2="380" stroke="#94a3b8" stroke-width="1"/>
  <line x1="100" y1="380" x2="820" y2="380" stroke="#94a3b8" stroke-width="1"/>

  <!-- y gridlines + ticks at 0,10,20,30,40,50 -->
  <line x1="100" y1="321.8" x2="820" y2="321.8" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="100" y1="263.6" x2="820" y2="263.6" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="100" y1="205.5" x2="820" y2="205.5" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="100" y1="147.3" x2="820" y2="147.3" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="100" y1="89.1" x2="820" y2="89.1" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="92" y="384" font-size="10.5" fill="#94a3b8" text-anchor="end">$0</text>
  <text x="92" y="325" font-size="10.5" fill="#94a3b8" text-anchor="end">$10</text>
  <text x="92" y="267" font-size="10.5" fill="#94a3b8" text-anchor="end">$20</text>
  <text x="92" y="209" font-size="10.5" fill="#94a3b8" text-anchor="end">$30</text>
  <text x="92" y="151" font-size="10.5" fill="#94a3b8" text-anchor="end">$40</text>
  <text x="92" y="92" font-size="10.5" fill="#94a3b8" text-anchor="end">$50</text>
  <text x="40" y="220" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90 40 220)">output price $/Mtok</text>

  <!-- x ticks at 40,45,50,55,60 -->
  <text x="160" y="398" font-size="10.5" fill="#94a3b8" text-anchor="middle">40</text>
  <text x="310" y="398" font-size="10.5" fill="#94a3b8" text-anchor="middle">45</text>
  <text x="460" y="398" font-size="10.5" fill="#94a3b8" text-anchor="middle">50</text>
  <text x="610" y="398" font-size="10.5" fill="#94a3b8" text-anchor="middle">55</text>
  <text x="760" y="398" font-size="10.5" fill="#94a3b8" text-anchor="middle">60</text>
  <text x="460" y="418" font-size="11" fill="#94a3b8" text-anchor="middle">Artificial Analysis Intelligence Index</text>

  <!-- ===== closed frontier (slate-blue) — the steep price curve ===== -->
  <!-- Muse Spark 1.1: Index 51 (x=490), $4.25 (y=355.3) -->
  <circle cx="490" cy="355.3" r="7" fill="#1e40af"/>
  <text x="490" y="374" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Muse Spark 1.1</text>
  <!-- Grok 4.5: Index 54 (x=580), $6 (y=345.1) -->
  <circle cx="580" cy="345.1" r="7" fill="#1e40af"/>
  <text x="580" y="335" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Grok 4.5</text>
  <!-- GPT-5.6 Sol: Index 58.9 (x=727), $30 (y=205.5) -->
  <circle cx="727" cy="205.5" r="7" fill="#1e40af"/>
  <text x="727" y="199" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">GPT-5.6 Sol</text>
  <!-- Claude Fable 5: Index 59.9 (x=757), $50 (y=89.1) -->
  <circle cx="757" cy="89.1" r="7" fill="#1e40af"/>
  <text x="757" y="82" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Claude Fable 5</text>

  <!-- ===== open weights (teal) — the two poles ===== -->
  <!-- Inkling: Index 41 (x=190), $4.68 (y=352.8) -->
  <circle cx="190" cy="352.8" r="8" fill="#0d9488"/>
  <text x="190" y="343" font-size="11.5" font-weight="700" fill="#0d9488" text-anchor="middle">Inkling</text>
  <text x="190" y="372" font-size="9.5" fill="#94a3b8" text-anchor="middle">US · Apache-2.0 · live</text>
  <!-- Kimi K3: Index 57 (x=670), $15 (y=292.7) -->
  <circle cx="670" cy="292.7" r="8" fill="#0d9488"/>
  <text x="670" y="286" font-size="11.5" font-weight="700" fill="#0d9488" text-anchor="middle">Kimi K3</text>
  <text x="670" y="311" font-size="9.5" fill="#94a3b8" text-anchor="middle">CN · weights &#8804; Jul 27</text>

  <!-- Gemini absent annotation -->
  <text x="150" y="90" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="start">Gemini 3.5 Pro</text>
  <text x="150" y="107" font-size="11" fill="#b91c1c" text-anchor="start">absent &#8212; unscored, unpriced</text>

  <!-- ===== legend ===== -->
  <circle cx="300" cy="443" r="7" fill="#0d9488"/>
  <text x="314" y="447" font-size="12" fill="#64748b" text-anchor="start">Open weights</text>
  <circle cx="470" cy="443" r="7" fill="#1e40af"/>
  <text x="484" y="447" font-size="12" fill="#64748b" text-anchor="start">Closed / hosted API</text>
</svg>

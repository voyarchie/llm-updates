<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Scatter plot of Artificial Analysis Intelligence Index score (vertical) against output price in dollars per million tokens (horizontal) for the mid-July 2026 frontier field. Claude Fable 5 scores 60 at 50 dollars output (gated adaptive-reasoning config). GPT-5.6 Sol scores 59 at 30 dollars — the new highest-scoring generally-available model at roughly a third of Fable's price. Claude Opus 4.8 scores 56 at 25 dollars, the former generally-available leader. GPT-5.6 Terra scores 55 at 15 dollars. Grok 4.5 scores 54 at 6 dollars. The top of the field is compressed into six Index points while output price spans more than eight times.">
  <title>Intelligence Index vs output price — the mid-July 2026 field</title>

  <!-- theme-neutral palette: slate text (#64748b / #94a3b8) reads on light and dark; saturated dots carry their own labels -->
  <text x="24" y="30" font-size="19" font-weight="700" fill="#64748b">Intelligence vs price — the crown changes hands (Jul 14, 2026)</text>
  <text x="24" y="51" font-size="12.5" fill="#94a3b8">Artificial Analysis Intelligence Index (higher = better) vs output $/Mtok (further left = cheaper). Up-and-left wins.</text>

  <!-- plot frame: x $0..$55 => px 120..830 (12.909 px/$); y idx 52..62 => px 340(52)..80(62), 26 px/pt -->
  <!-- y gridlines at index 54,56,58,60 -->
  <line x1="120" y1="288" x2="830" y2="288" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="120" y1="236" x2="830" y2="236" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="120" y1="184" x2="830" y2="184" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="120" y1="132" x2="830" y2="132" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="112" y="292" font-size="10.5" fill="#94a3b8" text-anchor="end">54</text>
  <text x="112" y="240" font-size="10.5" fill="#94a3b8" text-anchor="end">56</text>
  <text x="112" y="188" font-size="10.5" fill="#94a3b8" text-anchor="end">58</text>
  <text x="112" y="136" font-size="10.5" fill="#94a3b8" text-anchor="end">60</text>
  <text x="34" y="215" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90 34 215)">Intelligence Index</text>

  <!-- axes -->
  <line x1="120" y1="80" x2="120" y2="340" stroke="#94a3b8" stroke-width="1"/>
  <line x1="120" y1="340" x2="830" y2="340" stroke="#94a3b8" stroke-width="1"/>

  <!-- x ticks at $0,10,20,30,40,50 -->
  <text x="120" y="358" font-size="10.5" fill="#94a3b8" text-anchor="middle">$0</text>
  <text x="249" y="358" font-size="10.5" fill="#94a3b8" text-anchor="middle">$10</text>
  <text x="378" y="358" font-size="10.5" fill="#94a3b8" text-anchor="middle">$20</text>
  <text x="507" y="358" font-size="10.5" fill="#94a3b8" text-anchor="middle">$30</text>
  <text x="636" y="358" font-size="10.5" fill="#94a3b8" text-anchor="middle">$40</text>
  <text x="765" y="358" font-size="10.5" fill="#94a3b8" text-anchor="middle">$50</text>
  <text x="475" y="380" font-size="11" fill="#94a3b8" text-anchor="middle">output price ($ per million tokens)</text>

  <!-- the "generally available" ceiling: everything below the Fable dot is GA; Fable's 60 is the gated config -->
  <line x1="120" y1="158" x2="830" y2="158" stroke="#7c3aed" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="826" y="152" font-size="10" fill="#7c3aed" text-anchor="end">— gated adaptive-reasoning ceiling —</text>

  <!-- Fable 5: idx 60 ($50) => x 765.5, y 132 -->
  <circle cx="765" cy="132" r="9" fill="#7c3aed"/>
  <text x="765" y="118" font-size="12.5" font-weight="700" fill="#64748b" text-anchor="middle">Claude Fable 5 · 60</text>
  <text x="765" y="152" font-size="10" fill="#94a3b8" text-anchor="middle">gated · $50 out</text>

  <!-- GPT-5.6 Sol: idx 59 ($30) => x 507.3, y 158 -->
  <circle cx="507" cy="158" r="9" fill="#1e40af"/>
  <text x="507" y="178" font-size="12.5" font-weight="700" fill="#64748b" text-anchor="middle">GPT-5.6 Sol · 59</text>
  <text x="507" y="193" font-size="10" fill="#94a3b8" text-anchor="middle">new GA leader · $30 out</text>

  <!-- Opus 4.8: idx 56 ($25) => x 442.7, y 236 -->
  <circle cx="443" cy="236" r="9" fill="#0d9488"/>
  <text x="443" y="222" font-size="12.5" font-weight="700" fill="#64748b" text-anchor="middle">Claude Opus 4.8 · 56</text>
  <text x="443" y="256" font-size="10" fill="#94a3b8" text-anchor="middle">former GA leader · $25 out</text>

  <!-- GPT-5.6 Terra: idx 55 ($15) => x 313.6, y 262 -->
  <circle cx="314" cy="262" r="9" fill="#2563eb"/>
  <text x="314" y="248" font-size="12.5" font-weight="700" fill="#64748b" text-anchor="middle">GPT-5.6 Terra · 55</text>
  <text x="314" y="282" font-size="10" fill="#94a3b8" text-anchor="middle">$15 out</text>

  <!-- Grok 4.5: idx 54 ($6) => x 197.5, y 288 -->
  <circle cx="198" cy="288" r="9" fill="#f59e0b"/>
  <text x="198" y="312" font-size="12.5" font-weight="700" fill="#64748b" text-anchor="middle">Grok 4.5 · 54</text>
  <text x="198" y="327" font-size="10" fill="#94a3b8" text-anchor="middle">cheapest top-tier · $6 out</text>
</svg>

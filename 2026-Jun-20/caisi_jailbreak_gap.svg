<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 330" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-label="CAISI jailbreak-compliance gap: DeepSeek 94% vs US frontier reference 8%">
  <title>CAISI: malicious jailbreak requests answered (lower is safer)</title>

  <!-- Title (slate-500 reads on light and dark) -->
  <text x="20" y="34" font-size="20" font-weight="700" fill="#64748b">CAISI: share of malicious jailbreak requests answered</text>
  <text x="20" y="58" font-size="13" fill="#94a3b8">Lower is safer. Open-weight model vs. US reference frontier model. Source: NIST CAISI eval of DeepSeek V4&#8209;Pro.</text>

  <!-- gridlines at 0/25/50/75/100% -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.35">
    <line x1="240" y1="90" x2="240" y2="250"/>
    <line x1="345" y1="90" x2="345" y2="250"/>
    <line x1="450" y1="90" x2="450" y2="250"/>
    <line x1="555" y1="90" x2="555" y2="250"/>
    <line x1="660" y1="90" x2="660" y2="250"/>
  </g>
  <g font-size="11" fill="#94a3b8" text-anchor="middle">
    <text x="240" y="270">0%</text>
    <text x="345" y="270">25%</text>
    <text x="450" y="270">50%</text>
    <text x="555" y="270">75%</text>
    <text x="660" y="270">100%</text>
  </g>

  <!-- Bar 1: DeepSeek most-secure config 94% -->
  <text x="225" y="130" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">DeepSeek (most secure)</text>
  <rect x="240" y="110" width="394.8" height="40" rx="4" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="624" y="135" font-size="15" font-weight="700" fill="#ffffff" text-anchor="end">94%</text>

  <!-- Bar 2: US frontier reference 8% -->
  <text x="225" y="208" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">US frontier reference</text>
  <rect x="240" y="188" width="33.6" height="40" rx="4" fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
  <text x="285" y="213" font-size="15" font-weight="700" fill="#16a34a" text-anchor="start">8%</text>

  <!-- baseline axis -->
  <line x1="240" y1="250" x2="660" y2="250" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- caption -->
  <text x="20" y="306" font-size="12" fill="#94a3b8">An ~11.75&#215; safety gap on this metric — context for why open-weight frontier access and export policy are colliding in June 2026.</text>
</svg>

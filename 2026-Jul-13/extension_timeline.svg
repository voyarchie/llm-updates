<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Timeline of Anthropic's Claude Fable 5 free-access cutoff, pushed back three times. The original cutoff was July 7; it was extended to July 12, then on July 13 extended again to July 19. Metered $10 input / $50 output per million tokens now begins July 20. The green free-access window has been stretched right three times; the amber metered region starts July 20. A dashed 'today' line sits at July 13.">
  <title>Three delays: Claude Fable 5's free-access cutoff keeps sliding right</title>

  <!-- theme-neutral palette: slate labels/axis read on light and dark; saturated fills carry white text -->
  <text x="24" y="30" font-size="19" font-weight="700" fill="#64748b">Three delays — Fable 5's free window keeps sliding right</text>
  <text x="24" y="50" font-size="12.5" fill="#94a3b8">Announced cutoff for included (up-to-50%-of-weekly-limits) Fable 5 access, and when the $10/$50 meter starts.</text>

  <!-- baseline axis: Jul 5 (x=100) .. Jul 22 (x=820), 42.35 px/day -->
  <line x1="100" y1="150" x2="820" y2="150" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- day ticks -->
  <g fill="#94a3b8" font-size="10.5" text-anchor="middle">
    <text x="100" y="278">Jul 5</text>
    <text x="185" y="278">Jul 7</text>
    <text x="396" y="278">Jul 12</text>
    <text x="693" y="278">Jul 19</text>
    <text x="735" y="278">Jul 20</text>
    <text x="820" y="278">Jul 22</text>
  </g>

  <!-- green free-access window: Jul 5 -> Jul 19 -->
  <rect x="100" y="136" width="593" height="28" rx="5" fill="#0d9488"/>
  <text x="120" y="155" font-size="13" font-weight="700" fill="#ffffff">included access (free, up to 50% of weekly limits)</text>

  <!-- amber metered region: Jul 20 -> Jul 22 -->
  <rect x="735" y="136" width="85" height="28" rx="5" fill="#b45309"/>

  <!-- cutoff #1: Jul 7 (struck) -->
  <line x1="185" y1="92" x2="185" y2="150" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="185" cy="150" r="4" fill="#94a3b8"/>
  <text x="185" y="84" font-size="11.5" fill="#94a3b8" text-anchor="middle">cutoff #1</text>
  <line x1="163" y1="88" x2="207" y2="72" stroke="#94a3b8" stroke-width="1"/>

  <!-- cutoff #2: Jul 12 (struck) -->
  <line x1="396" y1="92" x2="396" y2="150" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="396" cy="150" r="4" fill="#94a3b8"/>
  <text x="396" y="84" font-size="11.5" fill="#94a3b8" text-anchor="middle">cutoff #2</text>
  <line x1="374" y1="88" x2="418" y2="72" stroke="#94a3b8" stroke-width="1"/>

  <!-- push arrows -->
  <path d="M 185 108 q 105 -22 205 0" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M 396 108 q 148 -22 291 0" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- cutoff #3 (current): Jul 19 -->
  <line x1="693" y1="98" x2="693" y2="150" stroke="#0d9488" stroke-width="2"/>
  <circle cx="693" cy="150" r="5" fill="#0d9488"/>
  <text x="693" y="90" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle">cutoff #3 — current</text>

  <!-- meter start: Jul 20 -->
  <line x1="735" y1="120" x2="735" y2="136" stroke="#b45309" stroke-width="2"/>
  <text x="785" y="118" font-size="12" font-weight="700" fill="#b45309" text-anchor="middle">meter on</text>
  <text x="785" y="132" font-size="10.5" fill="#b45309" text-anchor="middle">$10 / $50 Mtok</text>

  <!-- today marker: Jul 13 -->
  <line x1="439" y1="120" x2="439" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="439" y="216" font-size="11.5" font-weight="700" fill="#64748b" text-anchor="middle">today (Jul 13)</text>
  <text x="439" y="231" font-size="10" fill="#94a3b8" text-anchor="middle">3rd delay announced</text>
</svg>

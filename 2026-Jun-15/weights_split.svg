<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The widening weights split in June 2026: locked-down US frontier vs open-weights challengers">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #888; }
    .sub   { font-size: 12px; fill: #888; }
    .axis  { font-size: 12px; font-weight: 600; fill: #888; }
    .box   { rx: 8; }
    .label { font-size: 13px; font-weight: 700; fill: #ffffff; }
    .meta  { font-size: 11px; fill: #ffffff; opacity: 0.92; }
    .note  { font-size: 11px; fill: #888; }
  </style>

  <text x="380" y="28" text-anchor="middle" class="title">The widening weights split — June 2026</text>
  <text x="380" y="48" text-anchor="middle" class="sub">Same week: a US frontier model goes dark by government order while an open-weights rival ships into the gap</text>

  <!-- divider -->
  <line x1="380" y1="70" x2="380" y2="420" stroke="#888" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="190" y="88" text-anchor="middle" class="axis">LOCKED DOWN (closed weights)</text>
  <text x="570" y="88" text-anchor="middle" class="axis">OPEN WEIGHTS</text>

  <!-- LEFT: closed -->
  <rect x="40" y="104" width="300" height="84" class="box" fill="#dc2626"/>
  <text x="56" y="128" class="label">Anthropic — Fable 5 / Mythos 5</text>
  <text x="56" y="148" class="meta">Disabled worldwide Jun 12 by BIS export directive</text>
  <text x="56" y="165" class="meta">No restoration date · ID verification from Jul 8</text>
  <text x="56" y="182" class="meta">Mythos kept private (Project Glasswing only)</text>

  <rect x="40" y="200" width="300" height="72" class="box" fill="#475569"/>
  <text x="56" y="224" class="label">Meta — Muse Spark</text>
  <text x="56" y="244" class="meta">First Superintelligence Labs model; closed,</text>
  <text x="56" y="261" class="meta">ditches Llama's open-source playbook</text>

  <rect x="40" y="284" width="300" height="64" class="box" fill="#475569"/>
  <text x="56" y="308" class="label">OpenAI — GPT-5.5 · Google — Gemini 3.5</text>
  <text x="56" y="328" class="meta">Frontier capability, API/app only</text>

  <!-- RIGHT: open -->
  <rect x="420" y="104" width="300" height="84" class="box" fill="#16a34a"/>
  <text x="436" y="128" class="label">Z.ai — GLM 5.2  (Jun 13)</text>
  <text x="436" y="148" class="meta">744B MoE · ~40B active · 1M context</text>
  <text x="436" y="165" class="meta">MIT license · open weights "next week"</text>
  <text x="436" y="182" class="meta">Pitched directly against the Anthropic ban</text>

  <rect x="420" y="200" width="300" height="72" class="box" fill="#2563eb"/>
  <text x="436" y="224" class="label">Moonshot — Kimi K2.7-Code (Jun 12)</text>
  <text x="436" y="244" class="meta">1T MoE coding model, ~30% fewer</text>
  <text x="436" y="261" class="meta">reasoning tokens (benchmarks disputed)</text>

  <rect x="420" y="284" width="300" height="64" class="box" fill="#2563eb"/>
  <text x="436" y="308" class="label">DeepSeek V4 · Qwen 3 · MiniMax M3</text>
  <text x="436" y="328" class="meta">Open-weights field keeps shipping</text>

  <text x="380" y="382" text-anchor="middle" class="note">Geopolitics is now an architecture decision: the more a US lab's capability is governed by export control,</text>
  <text x="380" y="400" text-anchor="middle" class="note">the larger the opening for MIT/Apache-licensed Chinese frontier weights that no single government can switch off.</text>
</svg>

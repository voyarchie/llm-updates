<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="Inter, system-ui, sans-serif" font-size="13">
  <style>
    .title { font-size: 16px; font-weight: 700; fill: currentColor; }
    .label { fill: currentColor; }
    .muted { fill: currentColor; opacity: 0.65; }
    .box { fill: none; stroke: currentColor; stroke-width: 1.6; rx: 8; ry: 8; }
    .accent { stroke: #5b8def; }
    .ok { stroke: #4caf85; }
    .warn { stroke: #d97557; }
    .pill { fill: currentColor; opacity: 0.06; stroke: currentColor; stroke-width: 1; rx: 14; ry: 14; }
    .arrow { fill: none; stroke: currentColor; stroke-width: 1.4; marker-end: url(#arrow2); }
    .arrow-accent { stroke: #5b8def; }
    .arrow-ok { stroke: #4caf85; }
    .arrow-warn { stroke: #d97557; }
    .num { font-weight: 700; fill: currentColor; }
  </style>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <text x="20" y="28" class="title">Cloudflare Infire + Unweight: disaggregated inference at edge scale</text>
  <text x="20" y="50" class="muted">How prefill / decode separation, multi-GPU sharding, and lossless BF16 exponent compression compose.</text>

  <!-- Monolith -->
  <rect x="20" y="80" width="280" height="150" class="box warn"/>
  <text x="36" y="104" class="label" font-weight="600">Before: monolithic vLLM-style serving</text>
  <rect x="36" y="118" width="248" height="44" class="pill"/>
  <text x="50" y="146" class="label">One GPU pool, both phases compete</text>
  <text x="36" y="184" class="muted">• Prefill (compute-bound) starves decode (mem-bound)</text>
  <text x="36" y="204" class="muted">• KV-cache pressure ⇒ low tokens/sec/GPU</text>

  <!-- Disaggregated -->
  <rect x="320" y="80" width="580" height="150" class="box ok"/>
  <text x="336" y="104" class="label" font-weight="600">After: Infire disaggregated prefill + token-aware LB</text>
  <rect x="336" y="118" width="240" height="100" class="pill"/>
  <text x="350" y="142" class="label">Prefill pool (H100 NVL)</text>
  <text x="350" y="162" class="muted">Compute-optimized. Bursty.</text>
  <text x="350" y="184" class="muted">Tensor + expert parallel.</text>
  <rect x="592" y="118" width="294" height="100" class="pill"/>
  <text x="606" y="142" class="label">Decode pool (H200 NVL, KV-rich)</text>
  <text x="606" y="162" class="muted">Memory-optimized. Steady-state.</text>
  <text x="606" y="184" class="muted">Llama 4 Scout on 2× H200 leaves 56 GiB</text>
  <text x="606" y="204" class="muted">for 1.2M-token KV-cache.</text>
  <path d="M576 168 L592 168" class="arrow arrow-ok"/>

  <!-- KV stream label -->
  <text x="582" y="155" class="muted" font-size="11">KV stream</text>

  <!-- Unweight overlay -->
  <rect x="20" y="260" width="880" height="200" class="box accent"/>
  <text x="36" y="284" class="label" font-weight="600">Unweight: lossless MLP weight compression layered on top</text>
  <text x="36" y="306" class="muted">BF16 weights: 1-bit sign · 8-bit exponent · 7-bit mantissa. Cloudflare compresses the exponent only.</text>

  <rect x="36" y="320" width="180" height="60" class="pill"/>
  <text x="50" y="342" class="label" font-weight="600">Sign</text>
  <text x="50" y="362" class="muted">1 bit, untouched</text>
  <rect x="226" y="320" width="320" height="60" class="pill accent"/>
  <text x="240" y="342" class="label" font-weight="600">Exponent · Huffman-coded</text>
  <text x="240" y="362" class="muted">Top-16 of 256 values cover &gt;99% ⇒ ~30% smaller</text>
  <rect x="556" y="320" width="180" height="60" class="pill"/>
  <text x="570" y="342" class="label" font-weight="600">Mantissa</text>
  <text x="570" y="362" class="muted">7 bits, untouched</text>

  <text x="36" y="408" class="num">Net: ~22%</text>
  <text x="130" y="408" class="muted">model footprint reduction, bit-exact,</text>
  <text x="130" y="424" class="muted">applied to gate/up/down MLP projections — the two-thirds of params that dominate decode-stage memory traffic.</text>

  <text x="36" y="448" class="muted">Result on edge: Infire serves up to 7% faster than vLLM 0.10.0 unloaded; ~25–40% better under real load, on the same H100 NVL.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Output-token price per million tokens: Claude Fable 5 vs Claude Opus 4.8 vs leading open-weight models">
  <title>Output-token API price ($ per million tokens), standard rates</title>

  <text x="20" y="30" font-size="19" font-weight="700" fill="#64748b">From Jun 23, Fable 5 bills at API rates — and API rates are the story</text>
  <text x="20" y="52" font-size="13" fill="#94a3b8">Output price, USD per million tokens (standard, non-cached). Lower is cheaper.</text>

  <!-- bars: scale = 10.8 px / $, max $50 -> 540px; bars start x=170 -->
  <!-- Fable 5 -->
  <text x="160" y="91" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">Claude Fable 5</text>
  <rect x="170" y="74" width="540" height="28" rx="3" fill="#dc2626" stroke="#7f1d1d" stroke-width="1"/>
  <text x="718" y="93" font-size="13" font-weight="700" fill="#64748b">$50.00</text>

  <!-- Opus 4.8 -->
  <text x="160" y="135" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">Claude Opus 4.8</text>
  <rect x="170" y="118" width="270" height="28" rx="3" fill="#475569" stroke="#1e293b" stroke-width="1"/>
  <text x="448" y="137" font-size="13" font-weight="700" fill="#64748b">$25.00</text>

  <!-- GLM 5.2 -->
  <text x="160" y="179" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">GLM 5.2 (Zhipu)</text>
  <rect x="170" y="162" width="48" height="28" rx="3" fill="#16a34a" stroke="#14532d" stroke-width="1"/>
  <text x="226" y="181" font-size="13" font-weight="700" fill="#64748b">~$4.40</text>

  <!-- DeepSeek V4-Pro -->
  <text x="160" y="223" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">DeepSeek V4-Pro</text>
  <rect x="170" y="206" width="38" height="28" rx="3" fill="#16a34a" stroke="#14532d" stroke-width="1"/>
  <text x="216" y="225" font-size="13" font-weight="700" fill="#64748b">~$3.48</text>

  <!-- MiniMax M3 -->
  <text x="160" y="267" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">MiniMax M3</text>
  <rect x="170" y="250" width="13" height="28" rx="3" fill="#16a34a" stroke="#14532d" stroke-width="1"/>
  <text x="191" y="269" font-size="13" font-weight="700" fill="#64748b">~$1.20*</text>

  <!-- axis baseline -->
  <line x1="170" y1="294" x2="710" y2="294" stroke="#94a3b8" stroke-width="1"/>
  <text x="170" y="312" font-size="11" fill="#94a3b8">$0</text>
  <text x="386" y="312" font-size="11" fill="#94a3b8" text-anchor="middle">$20</text>
  <text x="602" y="312" font-size="11" fill="#94a3b8" text-anchor="middle">$40</text>
  <text x="710" y="312" font-size="11" fill="#94a3b8" text-anchor="end">$50/M</text>

  <text x="20" y="340" font-size="11" fill="#94a3b8">Sources: Anthropic / Claude API pricing, pricepertoken, BenchLM (Jun 2026). *M3 output price approximate (MiniMax open-weight tier).</text>
</svg>

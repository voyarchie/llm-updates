<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Timeline from July 6 to August 2, 2026 showing a cluster of model launches and regulatory deadlines: July 10 Qwen disables humanlike and user agents, mid-July DeepSeek V4-Pro and V4-Flash full public launch, July 15 China anthropomorphic AI rules take effect and Doubao turns agents off, July 17 Gemini 3.5 Pro general availability, and August 2 EU AI Act enforcement begins with Article 50 transparency and high-risk obligations.">
  <title>The mid-July 2026 release-and-regulation cliff</title>

  <!-- theme-neutral palette: mid-slate text reads on light and dark; blue = model launches, amber = regulation -->
  <text x="24" y="34" font-size="19" font-weight="700" fill="#64748b">The calendar compresses: launches and rules land the same fortnight</text>
  <text x="24" y="56" font-size="13" fill="#94a3b8">Jul 6 (today) &#8594; Aug 2, 2026. Blue = model launches &#183; Amber = regulatory deadlines.</text>

  <!-- baseline -->
  <line x1="80" y1="200" x2="800" y2="200" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="230" font-size="11" fill="#94a3b8" text-anchor="middle">Jul 6</text>
  <text x="800" y="230" font-size="11" fill="#94a3b8" text-anchor="middle">Aug 2</text>

  <!-- today marker -->
  <circle cx="80" cy="200" r="5" fill="#64748b"/>

  <!-- Jul 10 (day 4) x=186.7 : Qwen agents off - regulation, above -->
  <line x1="186.7" y1="200" x2="186.7" y2="120" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="186.7" cy="200" r="6" fill="#d97706"/>
  <text x="186.7" y="112" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle">Jul 10</text>
  <text x="186.7" y="96" font-size="11" fill="#94a3b8" text-anchor="middle">Qwen disables</text>
  <text x="186.7" y="82" font-size="11" fill="#94a3b8" text-anchor="middle">humanlike + user agents</text>

  <!-- mid-July (~day 12) x=400 : DeepSeek V4 GA - launch, below -->
  <line x1="400" y1="200" x2="400" y2="280" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="400" cy="200" r="6" fill="#2563eb"/>
  <text x="400" y="298" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle">mid-July (expected)</text>
  <text x="400" y="314" font-size="11" fill="#94a3b8" text-anchor="middle">DeepSeek V4-Pro / V4-Flash</text>
  <text x="400" y="328" font-size="11" fill="#94a3b8" text-anchor="middle">full public launch</text>

  <!-- Jul 15 (day 9) x=320 : China rules + Doubao - regulation, above -->
  <line x1="320" y1="200" x2="320" y2="140" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="320" cy="200" r="6" fill="#d97706"/>
  <text x="320" y="132" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle">Jul 15</text>
  <text x="320" y="116" font-size="11" fill="#94a3b8" text-anchor="middle">China anthropomorphic</text>
  <text x="320" y="102" font-size="11" fill="#94a3b8" text-anchor="middle">AI rules &#183; Doubao off</text>

  <!-- Jul 17 (day 11) x=373.3 : Gemini 3.5 Pro - launch, below (stagger lower) -->
  <line x1="493" y1="200" x2="493" y2="252" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="493" cy="200" r="6" fill="#2563eb"/>
  <text x="493" y="270" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle">Jul 17</text>
  <text x="580" y="255" font-size="11" fill="#94a3b8" text-anchor="middle">Gemini 3.5 Pro GA</text>
  <text x="580" y="269" font-size="11" fill="#94a3b8" text-anchor="middle">2M ctx &#183; Deep Think</text>

  <!-- Aug 2 (day 27) x=800 : EU AI Act - regulation, above -->
  <line x1="800" y1="200" x2="800" y2="130" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="800" cy="200" r="6" fill="#d97706"/>
  <text x="800" y="122" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle">Aug 2</text>
  <text x="800" y="106" font-size="11" fill="#94a3b8" text-anchor="end">EU AI Act</text>
  <text x="800" y="92" font-size="11" fill="#94a3b8" text-anchor="end">enforcement begins</text>

  <!-- legend -->
  <rect x="80" y="352" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="100" y="364" font-size="12" fill="#94a3b8">Model launch</text>
  <rect x="230" y="352" width="14" height="14" rx="3" fill="#d97706"/>
  <text x="250" y="364" font-size="12" fill="#94a3b8">Regulatory deadline</text>
</svg>

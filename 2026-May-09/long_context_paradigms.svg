<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13">
  <title>Two paradigms for long context — Recursive Language Models vs Lossless Context Management</title>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="440" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b">Two long-context paradigms in the wild · May 2026</text>

  <!-- Left column: RLM -->
  <rect x="30" y="50" width="400" height="380" rx="14" fill="#60a5fa" fill-opacity="0.10" stroke="#1d4ed8" stroke-width="1.6"/>
  <text x="230" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Recursive Language Models (RLM)</text>
  <text x="230" y="96" text-anchor="middle" fill="#64748b" font-size="11">Prime Intellect · model owns its memory strategy</text>

  <rect x="60"  y="120" width="340" height="42" rx="8" fill="#60a5fa" fill-opacity="0.30" stroke="#1d4ed8" stroke-width="1.4"/>
  <text x="230" y="145" text-anchor="middle" fill="#1d4ed8" font-weight="700">Prompt = environment, not a flat string</text>

  <rect x="60"  y="172" width="340" height="42" rx="8" fill="#60a5fa" fill-opacity="0.30" stroke="#1d4ed8" stroke-width="1.4"/>
  <text x="230" y="197" text-anchor="middle" fill="#1d4ed8" font-weight="700">Model writes Python in a REPL to chunk it</text>

  <rect x="60"  y="224" width="340" height="42" rx="8" fill="#60a5fa" fill-opacity="0.30" stroke="#1d4ed8" stroke-width="1.4"/>
  <text x="230" y="249" text-anchor="middle" fill="#1d4ed8" font-weight="700">Recursive sub-LLM calls on slices</text>

  <rect x="60"  y="276" width="340" height="42" rx="8" fill="#60a5fa" fill-opacity="0.30" stroke="#1d4ed8" stroke-width="1.4"/>
  <text x="230" y="301" text-anchor="middle" fill="#1d4ed8" font-weight="700">Trainable end-to-end (RLMEnv)</text>

  <line x1="230" y1="162" x2="230" y2="172" stroke="#64748b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="230" y1="214" x2="230" y2="224" stroke="#64748b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="230" y1="266" x2="230" y2="276" stroke="#64748b" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="60" y="332" width="340" height="80" rx="8" fill="#fde68a" fill-opacity="0.40" stroke="#854d0e" stroke-width="1.4"/>
  <text x="230" y="356" text-anchor="middle" font-weight="700" fill="#854d0e">Trade-off</text>
  <text x="230" y="376" text-anchor="middle" fill="#64748b" font-size="12">+ maximally flexible · learned compression</text>
  <text x="230" y="394" text-anchor="middle" fill="#64748b" font-size="12">− nondeterministic · same input ≠ same plan</text>

  <!-- Right column: LCM -->
  <rect x="450" y="50" width="400" height="380" rx="14" fill="#34d399" fill-opacity="0.10" stroke="#047857" stroke-width="1.6"/>
  <text x="650" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Lossless Context Management (LCM)</text>
  <text x="650" y="96" text-anchor="middle" fill="#64748b" font-size="11">Voltropy / Volt · runtime owns the memory</text>

  <rect x="480" y="120" width="340" height="42" rx="8" fill="#34d399" fill-opacity="0.30" stroke="#047857" stroke-width="1.4"/>
  <text x="650" y="145" text-anchor="middle" fill="#047857" font-weight="700">Prompt indexed into transactional store</text>

  <rect x="480" y="172" width="340" height="42" rx="8" fill="#34d399" fill-opacity="0.30" stroke="#047857" stroke-width="1.4"/>
  <text x="650" y="197" text-anchor="middle" fill="#047857" font-weight="700">High-fanout DAG of summaries (lossless ptrs)</text>

  <rect x="480" y="224" width="340" height="42" rx="8" fill="#34d399" fill-opacity="0.30" stroke="#047857" stroke-width="1.4"/>
  <text x="650" y="249" text-anchor="middle" fill="#047857" font-weight="700">Deterministic chunk / retry / compress rules</text>

  <rect x="480" y="276" width="340" height="42" rx="8" fill="#34d399" fill-opacity="0.30" stroke="#047857" stroke-width="1.4"/>
  <text x="650" y="301" text-anchor="middle" fill="#047857" font-weight="700">Model only reasons about the task</text>

  <line x1="650" y1="162" x2="650" y2="172" stroke="#64748b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="650" y1="214" x2="650" y2="224" stroke="#64748b" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="650" y1="266" x2="650" y2="276" stroke="#64748b" stroke-width="1.4" marker-end="url(#ar)"/>

  <rect x="480" y="332" width="340" height="80" rx="8" fill="#fde68a" fill-opacity="0.40" stroke="#854d0e" stroke-width="1.4"/>
  <text x="650" y="356" text-anchor="middle" font-weight="700" fill="#854d0e">Trade-off</text>
  <text x="650" y="376" text-anchor="middle" fill="#64748b" font-size="12">+ +4.5 to +12.6 vs Claude Code on OOLONG</text>
  <text x="650" y="394" text-anchor="middle" fill="#64748b" font-size="12">− memory shape baked in by engineers, not learned</text>

  <text x="440" y="455" text-anchor="middle" fill="#64748b" font-size="11">Sources: primeintellect.ai/blog/rlm · papers.voltropy.com/LCM · arxiv 2605.04050</text>
</svg>

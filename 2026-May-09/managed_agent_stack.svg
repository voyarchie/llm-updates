<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13">
  <title>Anthropic Managed Agents stack — dreaming, outcomes, orchestration</title>

  <defs>
    <marker id="mhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b">Anthropic Managed Agents — full stack as of Code with Claude, May 6</text>

  <!-- Lead agent box -->
  <rect x="340" y="60" width="200" height="68" rx="10" fill="#60a5fa" fill-opacity="0.25" stroke="#1d4ed8" stroke-width="2"/>
  <text x="440" y="86" text-anchor="middle" font-weight="700" fill="#1d4ed8">Lead Managed Agent</text>
  <text x="440" y="106" text-anchor="middle" fill="#64748b">decomposes goal · routes work · keeps shared filesystem</text>

  <!-- Sub-agents -->
  <g>
    <rect x="60"  y="170" width="160" height="56" rx="8" fill="#a78bfa" fill-opacity="0.20" stroke="#5b21b6" stroke-width="1.6"/>
    <text x="140" y="194" text-anchor="middle" font-weight="700" fill="#5b21b6">Specialist 1</text>
    <text x="140" y="212" text-anchor="middle" fill="#64748b">own model · prompt · tools</text>

    <rect x="240" y="170" width="160" height="56" rx="8" fill="#a78bfa" fill-opacity="0.20" stroke="#5b21b6" stroke-width="1.6"/>
    <text x="320" y="194" text-anchor="middle" font-weight="700" fill="#5b21b6">Specialist 2</text>
    <text x="320" y="212" text-anchor="middle" fill="#64748b">parallel · shared FS</text>

    <rect x="420" y="170" width="160" height="56" rx="8" fill="#a78bfa" fill-opacity="0.20" stroke="#5b21b6" stroke-width="1.6"/>
    <text x="500" y="194" text-anchor="middle" font-weight="700" fill="#5b21b6">Specialist …</text>
    <text x="500" y="212" text-anchor="middle" fill="#64748b">up to 20 parallel</text>

    <rect x="600" y="170" width="160" height="56" rx="8" fill="#a78bfa" fill-opacity="0.20" stroke="#5b21b6" stroke-width="1.6"/>
    <text x="680" y="194" text-anchor="middle" font-weight="700" fill="#5b21b6">Specialist N</text>
    <text x="680" y="212" text-anchor="middle" fill="#64748b">delegated by lead</text>
  </g>

  <!-- arrows lead -> specialists -->
  <line x1="380" y1="128" x2="160" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#mhead)"/>
  <line x1="410" y1="128" x2="320" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#mhead)"/>
  <line x1="470" y1="128" x2="500" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#mhead)"/>
  <line x1="500" y1="128" x2="660" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#mhead)"/>

  <!-- Outcomes grader -->
  <rect x="60" y="270" width="320" height="80" rx="10" fill="#fde68a" fill-opacity="0.45" stroke="#854d0e" stroke-width="2"/>
  <text x="220" y="296" text-anchor="middle" font-weight="700" fill="#854d0e">Outcomes — rubric grader (public beta)</text>
  <text x="220" y="316" text-anchor="middle" fill="#64748b">separate Claude instance · own context window</text>
  <text x="220" y="334" text-anchor="middle" fill="#64748b">~+10 pp success on hardest tasks</text>

  <!-- Dreaming -->
  <rect x="500" y="270" width="320" height="80" rx="10" fill="#34d399" fill-opacity="0.30" stroke="#047857" stroke-width="2"/>
  <text x="660" y="296" text-anchor="middle" font-weight="700" fill="#047857">Dreaming — scheduled reflection (research preview)</text>
  <text x="660" y="316" text-anchor="middle" fill="#64748b">reviews past sessions · extracts patterns</text>
  <text x="660" y="334" text-anchor="middle" fill="#64748b">curates shared memory across an agent fleet</text>

  <!-- arrows specialists -> grader -->
  <line x1="180" y1="226" x2="180" y2="270" stroke="#64748b" stroke-width="1.4" marker-end="url(#mhead)"/>
  <line x1="320" y1="226" x2="240" y2="270" stroke="#64748b" stroke-width="1.4" marker-end="url(#mhead)"/>

  <!-- arrow grader -> lead loop -->
  <path d="M220,270 C220,200 280,130 340,116" fill="none" stroke="#854d0e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#mhead)"/>
  <text x="200" y="160" text-anchor="middle" fill="#854d0e" font-size="11">retry until rubric passes</text>

  <!-- arrow specialists -> dreaming -->
  <line x1="500" y1="226" x2="600" y2="270" stroke="#64748b" stroke-width="1.4" marker-end="url(#mhead)"/>
  <line x1="680" y1="226" x2="680" y2="270" stroke="#64748b" stroke-width="1.4" marker-end="url(#mhead)"/>

  <!-- arrow dreaming -> lead -->
  <path d="M660,270 C660,200 600,130 540,116" fill="none" stroke="#047857" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#mhead)"/>
  <text x="660" y="160" text-anchor="middle" fill="#047857" font-size="11">curated patterns + memory</text>

  <!-- Webhooks bar -->
  <rect x="60" y="380" width="760" height="44" rx="8" fill="#fb923c" fill-opacity="0.20" stroke="#9a3412" stroke-width="1.6"/>
  <text x="440" y="408" text-anchor="middle" font-weight="700" fill="#9a3412">Webhooks · Code Execution · Files API · MCP — runtime substrate (managed)</text>

  <!-- Caption -->
  <text x="440" y="448" text-anchor="middle" fill="#64748b" font-size="11">Source: anthropic.com — Code with Claude 2026 keynote, May 6</text>
</svg>

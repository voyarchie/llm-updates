<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Timeline of July 2026 LLM launch window: July 1 Fable 5 returns globally; July 8 Fable 5 shifts to usage-credit pricing and DeepSeek's July 24 retirement deadline surfaces; July 17 Gemini 3.5 Pro targeted general availability after a from-scratch rebuild; July 24 DeepSeek retires deepseek-chat and deepseek-reasoner at 15:59 UTC; GPT-5.6 broad access and Grok 4.5 public launch expected mid-to-late July but undated.">
  <title>The mid-July 2026 launch window</title>

  <!-- theme-neutral palette: saturated fills + white text render on both light and dark; slate labels read on both -->
  <text x="24" y="34" font-size="19" font-weight="700" fill="#64748b">The mid-July 2026 launch window</text>
  <text x="24" y="56" font-size="13" fill="#94a3b8">Five frontier events converging inside three weeks. Dashed markers are targeted or expected, not confirmed.</text>

  <!-- axis: Jul 1 (x=70) .. Jul 31 (x=820), 25px per day -->
  <line x1="70" y1="250" x2="820" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <!-- weekly ticks -->
  <line x1="70"  y1="245" x2="70"  y2="255" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="70"  y="274" font-size="11" fill="#94a3b8" text-anchor="middle">Jul 1</text>
  <line x1="245" y1="245" x2="245" y2="255" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="245" y="274" font-size="11" fill="#94a3b8" text-anchor="middle">Jul 8</text>
  <line x1="470" y1="245" x2="470" y2="255" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="470" y="274" font-size="11" fill="#94a3b8" text-anchor="middle">Jul 17</text>
  <line x1="645" y1="245" x2="645" y2="255" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="645" y="274" font-size="11" fill="#94a3b8" text-anchor="middle">Jul 24</text>
  <line x1="820" y1="245" x2="820" y2="255" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="820" y="274" font-size="11" fill="#94a3b8" text-anchor="middle">Jul 31</text>

  <!-- "today" band at Jul 8 -->
  <line x1="245" y1="80" x2="245" y2="250" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="245" y="74" font-size="10" font-weight="700" fill="#64748b" text-anchor="middle">TODAY</text>

  <!-- Jul 1: Fable 5 returns (confirmed, green) -->
  <line x1="70" y1="250" x2="70" y2="150" stroke="#16a34a" stroke-width="2"/>
  <rect x="18" y="108" width="150" height="40" rx="5" fill="#16a34a"/>
  <text x="93" y="126" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Fable 5 back</text>
  <text x="93" y="141" font-size="10.5" fill="#ffffff" text-anchor="middle">global, guarded</text>

  <!-- Jul 8: Fable credit cliff + DeepSeek deadline surfaces (amber) -->
  <line x1="245" y1="250" x2="245" y2="196" stroke="#d97706" stroke-width="2"/>
  <rect x="175" y="154" width="168" height="42" rx="5" fill="#d97706"/>
  <text x="259" y="172" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">Fable 5 &#8594; credit pricing</text>
  <text x="259" y="187" font-size="10.5" fill="#ffffff" text-anchor="middle">$10 / $50 per Mtok</text>

  <!-- Jul 17: Gemini 3.5 Pro (targeted, purple, dashed) -->
  <line x1="470" y1="250" x2="470" y2="150" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 4"/>
  <rect x="388" y="108" width="164" height="42" rx="5" fill="#7c3aed"/>
  <text x="470" y="126" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Gemini 3.5 Pro (target)</text>
  <text x="470" y="141" font-size="10.5" fill="#ffffff" text-anchor="middle">from-scratch rebuild, 2M ctx</text>

  <!-- Jul 24: DeepSeek retirement (confirmed, red) -->
  <line x1="645" y1="250" x2="645" y2="196" stroke="#dc2626" stroke-width="2"/>
  <rect x="560" y="154" width="180" height="42" rx="5" fill="#dc2626"/>
  <text x="650" y="172" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">DeepSeek legacy IDs die</text>
  <text x="650" y="187" font-size="10.5" fill="#ffffff" text-anchor="middle">15:59 UTC, hard cutoff</text>

  <!-- undated band: GPT-5.6 + Grok 4.5 (blue, floating, no fixed x) -->
  <rect x="640" y="300" width="200" height="60" rx="6" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="740" y="320" font-size="11.5" font-weight="700" fill="#2563eb" text-anchor="middle">Expected, undated</text>
  <text x="740" y="337" font-size="10.5" fill="#64748b" text-anchor="middle">GPT-5.6 broad access</text>
  <text x="740" y="352" font-size="10.5" fill="#64748b" text-anchor="middle">Grok 4.5 public launch</text>

  <!-- legend -->
  <rect x="24" y="308" width="13" height="13" rx="3" fill="#16a34a"/>
  <text x="43" y="319" font-size="11" fill="#94a3b8">Shipped / confirmed date</text>
  <rect x="24" y="330" width="13" height="13" rx="3" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="43" y="341" font-size="11" fill="#94a3b8">Targeted / expected</text>
</svg>

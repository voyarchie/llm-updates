<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Horizontal bar chart of Artificial Analysis Intelligence Index by Gemini tier after Google's July 21, 2026 release. Two shipped models in teal: Gemini 3.5 Flash-Lite at Index 36 (up 11 from 3.1 Flash-Lite) and Gemini 3.6 Flash at Index 50 (flat versus 3.5 Flash, but task time roughly halved and 17 percent fewer output tokens). The Gemini 3.5 Pro flagship rung is an empty amber dashed bar labelled not shipped, still in partner testing. A purple dashed bar marks Gemini 4, whose most ambitious pre-training run yet has just started. The chart shows Google competed on efficiency at the Flash tier while the flagship tier stayed empty and attention shifted to Gemini 4.">
  <title>Google's Gemini lineup after Jul 21: the Flash tier ships, the Pro-sized hole remains</title>

  <!-- theme-neutral palette: saturated fills carry white text on light and dark; slate labels/axis read on both -->
  <text x="24" y="30" font-size="19" font-weight="700" fill="#64748b">Google shipped the Flash tier — the flagship rung is still empty</text>
  <text x="24" y="50" font-size="12.5" fill="#94a3b8">Artificial Analysis Intelligence Index by Gemini tier after the Jul 21 2026 release (higher = smarter).</text>

  <!-- plot: x 230..820 maps Index 0..60 -> x(v)=230+v*9.833 ; vertical gridlines 0,15,30,45,60 -->
  <line x1="230" y1="80" x2="230" y2="310" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="377.5" y1="80" x2="377.5" y2="310" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="525" y1="80" x2="525" y2="310" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="672.5" y1="80" x2="672.5" y2="310" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="820" y1="80" x2="820" y2="310" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="230" y1="310" x2="820" y2="310" stroke="#94a3b8" stroke-width="1"/>
  <text x="230" y="326" font-size="10.5" fill="#94a3b8" text-anchor="middle">0</text>
  <text x="377.5" y="326" font-size="10.5" fill="#94a3b8" text-anchor="middle">15</text>
  <text x="525" y="326" font-size="10.5" fill="#94a3b8" text-anchor="middle">30</text>
  <text x="672.5" y="326" font-size="10.5" fill="#94a3b8" text-anchor="middle">45</text>
  <text x="820" y="326" font-size="10.5" fill="#94a3b8" text-anchor="middle">60</text>
  <text x="525" y="346" font-size="11" fill="#94a3b8" text-anchor="middle">Artificial Analysis Intelligence Index</text>

  <!-- Row 1: Gemini 3.5 Flash-Lite, Index 36 -> width 354, x 230..584 -->
  <text x="220" y="99" font-size="12" font-weight="600" fill="#64748b" text-anchor="end">Gemini 3.5 Flash-Lite</text>
  <text x="220" y="114" font-size="9.5" fill="#94a3b8" text-anchor="end">NEW · +11 vs 3.1 Flash-Lite</text>
  <rect x="230" y="90" width="354" height="30" rx="3" fill="#0d9488"/>
  <text x="574" y="110" font-size="12" font-weight="700" fill="#ffffff" text-anchor="end">36</text>

  <!-- Row 2: Gemini 3.6 Flash, Index 50 -> width 491.7, x 230..721.7 -->
  <text x="220" y="149" font-size="12" font-weight="600" fill="#64748b" text-anchor="end">Gemini 3.6 Flash</text>
  <text x="220" y="164" font-size="9.5" fill="#94a3b8" text-anchor="end">NEW · flat Index, ~½ task time</text>
  <rect x="230" y="140" width="491.7" height="30" rx="3" fill="#0d9488"/>
  <text x="711.7" y="160" font-size="12" font-weight="700" fill="#ffffff" text-anchor="end">50</text>
  <text x="731" y="160" font-size="9.5" fill="#94a3b8" text-anchor="start">−17% output tokens</text>

  <!-- Row 3: Gemini 3.5 Pro - empty flagship rung -->
  <text x="220" y="199" font-size="12" font-weight="600" fill="#b45309" text-anchor="end">Gemini 3.5 Pro</text>
  <text x="220" y="214" font-size="9.5" fill="#b45309" text-anchor="end">flagship tier</text>
  <rect x="230" y="190" width="590" height="30" rx="3" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="525" y="210" font-size="12" font-weight="700" fill="#b45309" text-anchor="middle">NOT SHIPPED — still in partner testing</text>

  <!-- Row 4: Gemini 4 - future, pre-training -->
  <text x="220" y="249" font-size="12" font-weight="600" fill="#7c3aed" text-anchor="end">Gemini 4</text>
  <text x="220" y="264" font-size="9.5" fill="#94a3b8" text-anchor="end">next generation</text>
  <rect x="230" y="240" width="590" height="30" rx="3" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="2 5"/>
  <text x="525" y="260" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle">"most ambitious pre-training run yet" started</text>

  <!-- legend -->
  <rect x="230" y="388" width="14" height="14" rx="2" fill="#0d9488"/>
  <text x="250" y="400" font-size="11.5" fill="#64748b" text-anchor="start">Shipped Jul 21</text>
  <rect x="368" y="388" width="14" height="14" rx="2" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="388" y="400" font-size="11.5" fill="#64748b" text-anchor="start">Absent (flagship)</text>
  <rect x="520" y="388" width="14" height="14" rx="2" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="2 4"/>
  <text x="540" y="400" font-size="11.5" fill="#64748b" text-anchor="start">In pre-training</text>
</svg>

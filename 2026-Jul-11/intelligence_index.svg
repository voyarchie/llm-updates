<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Horizontal bar chart of the Artificial Analysis Intelligence Index as of July 11 2026. Claude Fable 5 (gated adaptive config) 60. GPT-5.6 Sol max 59, newly scored today and now second overall. Claude Opus 4.8 max 56. GPT-5.6 Terra 55. GPT-5.5 xhigh 55. Grok 4.5 54. The top six frontier models sit within six index points of one another, while their output prices span roughly eight times.">

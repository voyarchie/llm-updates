<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Cyber AI stack: Anthropic Mythos vs OpenAI Daybreak, May 11 2026">
  <title>Cyber-defensive AI stacks compared — Anthropic Mythos vs OpenAI Daybreak (week of May 11, 2026)</title>

  <defs>
    <style>
      .title    { font-size: 19px; font-weight: 700; fill: #0f172a; }
      .sub      { font-size: 12px; fill: #475569; }
      .h        { font-size: 14px; font-weight: 700; }
      .b        { font-size: 12px; }
      .muted    { font-size: 11px; fill: #475569; }
      .vs       { font-size: 24px; font-weight: 800; fill: #64748b; }
      @media (prefers-color-scheme: dark) {
        .title { fill: #f1f5f9; }
        .sub, .muted { fill: #cbd5e1; }
        .vs { fill: #94a3b8; }
      }
    </style>
  </defs>

  <text x="440" y="28" text-anchor="middle" class="title">Cyber AI showdown — week of May 11, 2026</text>
  <text x="440" y="48" text-anchor="middle" class="sub">Anthropic Mythos / Project Glasswing  vs.  OpenAI Daybreak / Trusted Access for Cyber</text>

  <!-- LEFT: Anthropic Mythos -->
  <g>
    <rect x="40" y="70" width="370" height="410" rx="16" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="225" y="98" text-anchor="middle" class="h" fill="#7c2d12">Anthropic — Claude Mythos Preview</text>
    <text x="225" y="116" text-anchor="middle" class="muted">announced Apr 7 · Glasswing partners only · invite-only</text>

    <!-- Model -->
    <rect x="60" y="132" width="330" height="58" rx="10" fill="#fef3c7" stroke="#b45309"/>
    <text x="225" y="153" text-anchor="middle" class="h" fill="#7c2d12">Model — Claude Mythos Preview</text>
    <text x="225" y="172" text-anchor="middle" class="b" fill="#1c1917">general-purpose · coding / agentic / cyber tilt</text>
    <text x="225" y="186" text-anchor="middle" class="muted">$25 in / $125 out per 1M tokens · 5× Opus 4.7</text>

    <!-- Program -->
    <rect x="60" y="202" width="330" height="78" rx="10" fill="#fef3c7" stroke="#b45309"/>
    <text x="225" y="223" text-anchor="middle" class="h" fill="#7c2d12">Program — Project Glasswing</text>
    <text x="225" y="241" text-anchor="middle" class="b" fill="#1c1917">12 launch partners + ~40 critical-infra orgs</text>
    <text x="225" y="257" text-anchor="middle" class="muted">AWS · Apple · Broadcom · Cisco · CrowdStrike</text>
    <text x="225" y="271" text-anchor="middle" class="muted">Google · JPMC · Linux Foundation · MS · NVIDIA · Palo Alto</text>

    <!-- Distribution -->
    <rect x="60" y="292" width="330" height="58" rx="10" fill="#fef3c7" stroke="#b45309"/>
    <text x="225" y="313" text-anchor="middle" class="h" fill="#7c2d12">Distribution surface</text>
    <text x="225" y="331" text-anchor="middle" class="b" fill="#1c1917">Claude API · Bedrock · Vertex AI · Foundry</text>
    <text x="225" y="345" text-anchor="middle" class="muted">$100M usage credits + $4M OSS-security donations</text>

    <!-- Results -->
    <rect x="60" y="362" width="330" height="100" rx="10" fill="#fef3c7" stroke="#b45309"/>
    <text x="225" y="383" text-anchor="middle" class="h" fill="#7c2d12">Demonstrated capability</text>
    <text x="225" y="402" text-anchor="middle" class="b" fill="#1c1917">17-yr FreeBSD RCE (CVE-2026-4747) auto-exploit</text>
    <text x="225" y="418" text-anchor="middle" class="b" fill="#1c1917">~300 Firefox vulns · tens of thousands total</text>
    <text x="225" y="434" text-anchor="middle" class="b" fill="#1c1917">AISI Expert-tier cyber: 68.6%</text>
    <text x="225" y="450" text-anchor="middle" class="muted">US banks patching in days, not weeks (May 11–13)</text>
  </g>

  <!-- VS -->
  <text x="440" y="275" text-anchor="middle" class="vs">vs</text>

  <!-- RIGHT: OpenAI Daybreak -->
  <g>
    <rect x="470" y="70" width="370" height="410" rx="16" fill="#bae6fd" stroke="#075985" stroke-width="1.5"/>
    <text x="655" y="98" text-anchor="middle" class="h" fill="#0c4a6e">OpenAI — Daybreak (launched May 11)</text>
    <text x="655" y="116" text-anchor="middle" class="muted">platform for cyber defenders · broad access via TAC</text>

    <!-- Model layer -->
    <rect x="490" y="132" width="330" height="78" rx="10" fill="#e0f2fe" stroke="#075985"/>
    <text x="655" y="152" text-anchor="middle" class="h" fill="#0c4a6e">Models — three tiers</text>
    <text x="655" y="170" text-anchor="middle" class="b" fill="#0f172a">GPT-5.5 · standard safeguards</text>
    <text x="655" y="186" text-anchor="middle" class="b" fill="#0f172a">GPT-5.5 + TAC · vetted defensive use</text>
    <text x="655" y="202" text-anchor="middle" class="b" fill="#0f172a">GPT-5.5-Cyber · red-team / pentest / validation</text>

    <!-- Program -->
    <rect x="490" y="222" width="330" height="78" rx="10" fill="#e0f2fe" stroke="#075985"/>
    <text x="655" y="242" text-anchor="middle" class="h" fill="#0c4a6e">Program — Trusted Access for Cyber</text>
    <text x="655" y="260" text-anchor="middle" class="b" fill="#0f172a">identity-gated · partner-verified · OpenAI cyber co.</text>
    <text x="655" y="276" text-anchor="middle" class="muted">Akamai · Cisco · Cloudflare · CrowdStrike</text>
    <text x="655" y="290" text-anchor="middle" class="muted">Fortinet · Oracle · Palo Alto · Zscaler · + EU AI Office</text>

    <!-- Capabilities -->
    <rect x="490" y="312" width="330" height="80" rx="10" fill="#e0f2fe" stroke="#075985"/>
    <text x="655" y="332" text-anchor="middle" class="h" fill="#0c4a6e">Daybreak platform capabilities</text>
    <text x="655" y="350" text-anchor="middle" class="b" fill="#0f172a">editable threat models from repo</text>
    <text x="655" y="366" text-anchor="middle" class="b" fill="#0f172a">attack-path validation in isolated env</text>
    <text x="655" y="382" text-anchor="middle" class="b" fill="#0f172a">Codex Security integration · patch validation</text>

    <!-- Results -->
    <rect x="490" y="404" width="330" height="60" rx="10" fill="#e0f2fe" stroke="#075985"/>
    <text x="655" y="424" text-anchor="middle" class="h" fill="#0c4a6e">Benchmarks / AISI eval</text>
    <text x="655" y="442" text-anchor="middle" class="b" fill="#0f172a">Expert-tier cyber: 71.4% · 32-step range solved</text>
    <text x="655" y="458" text-anchor="middle" class="muted">reverse-engineering challenge: 10m 22s / $1.73</text>
  </g>

  <!-- Footer -->
  <text x="440" y="502" text-anchor="middle" class="muted">Both companies say the same thing: cyber-capable frontier models exist, the question is who has access and how it is governed.</text>
</svg>

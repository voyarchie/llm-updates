<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Arena.ai blind human-preference Elo change for Claude Fable 5 after the July 1 2026 relaunch, by category: document +34, expert text +25, creative writing +9, hard prompts -3, coding -18, frontend code -27 (1650 to 1623). All changes are within roughly plus or minus 30 Elo, indicating the delivered model is essentially unchanged.">
  <title>When Fable 5 answers, it's flat — Arena.ai human-preference deltas</title>

  <!-- theme-neutral palette: saturated fills + mid-slate labels read on both light and dark -->
  <text x="24" y="34" font-size="19" font-weight="700" fill="#64748b">When it answers, Fable 5 is essentially the same model</text>
  <text x="24" y="56" font-size="13" fill="#94a3b8">Arena.ai blind human-preference Elo change, June build &#8594; Jul-1 relaunch. Every category within &#177;~30 Elo.</text>

  <!-- zero baseline -->
  <line x1="430" y1="86" x2="430" y2="346" stroke="#94a3b8" stroke-width="2"/>
  <text x="430" y="366" font-size="11" fill="#94a3b8" text-anchor="middle">0 (no change)</text>

  <!-- gridlines at -20 (310) and +20 (550) and +/-10 -->
  <line x1="310" y1="86" x2="310" y2="346" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="550" y1="86" x2="550" y2="346" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="310" y="82" font-size="10" fill="#94a3b8" text-anchor="middle">&#8722;20</text>
  <text x="550" y="82" font-size="10" fill="#94a3b8" text-anchor="middle">+20</text>

  <!-- Document +34 : 430 -> 634 -->
  <text x="250" y="117" font-size="13" fill="#64748b" text-anchor="end">Document</text>
  <rect x="430" y="100" width="204" height="24" rx="3" fill="#16a34a"/>
  <text x="644" y="117" font-size="12" font-weight="700" fill="#16a34a">+34</text>

  <!-- Expert text +25 : 430 -> 580 -->
  <text x="250" y="159" font-size="13" fill="#64748b" text-anchor="end">Expert text</text>
  <rect x="430" y="142" width="150" height="24" rx="3" fill="#16a34a"/>
  <text x="590" y="159" font-size="12" font-weight="700" fill="#16a34a">+25</text>

  <!-- Creative writing +9 : 430 -> 484 -->
  <text x="250" y="201" font-size="13" fill="#64748b" text-anchor="end">Creative writing</text>
  <rect x="430" y="184" width="54" height="24" rx="3" fill="#16a34a"/>
  <text x="494" y="201" font-size="12" font-weight="700" fill="#16a34a">+9</text>

  <!-- Hard prompts -3 : 412 -> 430 -->
  <text x="250" y="243" font-size="13" fill="#64748b" text-anchor="end">Hard prompts</text>
  <rect x="412" y="226" width="18" height="24" rx="3" fill="#d97706"/>
  <text x="404" y="243" font-size="12" font-weight="700" fill="#d97706" text-anchor="end">&#8722;3</text>

  <!-- Coding -18 : 322 -> 430 -->
  <text x="250" y="285" font-size="13" fill="#64748b" text-anchor="end">Coding</text>
  <rect x="322" y="268" width="108" height="24" rx="3" fill="#d97706"/>
  <text x="314" y="285" font-size="12" font-weight="700" fill="#d97706" text-anchor="end">&#8722;18</text>

  <!-- Frontend code -27 : 268 -> 430 (1650 -> 1623) -->
  <text x="250" y="327" font-size="13" fill="#64748b" text-anchor="end">Frontend code</text>
  <rect x="268" y="310" width="162" height="24" rx="3" fill="#d97706"/>
  <text x="260" y="327" font-size="12" font-weight="700" fill="#d97706" text-anchor="end">&#8722;27</text>

  <!-- contrast callout -->
  <text x="796" y="250" font-size="12" font-weight="700" fill="#64748b" text-anchor="end">Contrast: BridgeBench</text>
  <text x="796" y="268" font-size="11" fill="#dc2626" text-anchor="end">debugging &#8722;70% (86.2&#8594;25.9)</text>
  <text x="796" y="284" font-size="11" fill="#94a3b8" text-anchor="end">&#8212; but that scores the</text>
  <text x="796" y="300" font-size="11" fill="#94a3b8" text-anchor="end">router's fallbacks as 0.</text>

  <!-- legend -->
  <rect x="270" y="386" width="14" height="14" rx="3" fill="#16a34a"/>
  <text x="290" y="398" font-size="12" fill="#94a3b8">Improved</text>
  <rect x="400" y="386" width="14" height="14" rx="3" fill="#d97706"/>
  <text x="420" y="398" font-size="12" fill="#94a3b8">Slightly lower (within confidence interval)</text>
</svg>

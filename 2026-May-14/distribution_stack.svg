<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" role="img" aria-label="May 14 2026 distribution stack: three labs, three theories">
  <title>How each frontier lab is reaching enterprise users — May 14, 2026</title>
  <defs>
    <style>
      .axis { stroke: #94a3b8; stroke-width: 1.25; }
      .grid { stroke: #94a3b8; stroke-opacity: 0.25; stroke-dasharray: 3 3; }
      .label { fill: #475569; }
      .title { fill: #0f172a; font-weight: 600; font-size: 15px; }
      .col-h { fill: #0f172a; font-weight: 600; font-size: 14px; }
      .row-h { fill: #475569; font-size: 12px; }
      .box   { stroke-width: 1.5; rx: 8; ry: 8; }
      .box-t { fill: #0f172a; font-size: 12px; }
      .anth  { fill: #fde68a; stroke: #b45309; }
      .oai   { fill: #bbf7d0; stroke: #047857; }
      .goog  { fill: #bae6fd; stroke: #0369a1; }
      .meta  { fill: #ede9fe; stroke: #6d28d9; }
      .legend-t { fill: #475569; font-size: 11px; }
      @media (prefers-color-scheme: dark) {
        .title, .col-h, .box-t { fill: #f8fafc; }
        .label, .row-h, .legend-t { fill: #cbd5e1; }
        .axis { stroke: #64748b; }
        .anth { fill: #78350f; stroke: #fbbf24; }
        .oai  { fill: #064e3b; stroke: #34d399; }
        .goog { fill: #075985; stroke: #38bdf8; }
        .meta { fill: #4c1d95; stroke: #c4b5fd; }
        .box-t { fill: #f8fafc; }
      }
    </style>
  </defs>

  <text x="20" y="28" class="title">How frontier labs reached enterprise users this week (May 11–14, 2026)</text>
  <text x="20" y="48" class="label" font-size="12">Three labs, three distribution theories — each landed a concrete move in the 96 hours covered by this brief.</text>

  <!-- Column headers -->
  <text x="180" y="86" class="col-h" text-anchor="middle">OpenAI</text>
  <text x="180" y="102" class="row-h" text-anchor="middle">Acquire the services layer</text>
  <text x="465" y="86" class="col-h" text-anchor="middle">Anthropic</text>
  <text x="465" y="102" class="row-h" text-anchor="middle">Embed in customer surface</text>
  <text x="750" y="86" class="col-h" text-anchor="middle">Google</text>
  <text x="750" y="102" class="row-h" text-anchor="middle">Rebuild the OS around the agent</text>

  <!-- Row labels -->
  <text x="22" y="160" class="row-h">Headline move</text>
  <text x="22" y="260" class="row-h">Channel target</text>
  <text x="22" y="360" class="row-h">Distribution shape</text>
  <text x="22" y="460" class="row-h">Forward read</text>

  <!-- Row 1: Headline move -->
  <rect x="55"  y="130" width="250" height="80" class="box oai"/>
  <text x="70"  y="152" class="box-t">DeployCo launches, $4B raised</text>
  <text x="70"  y="170" class="box-t">at $14B pre-money valuation.</text>
  <text x="70"  y="188" class="box-t">Acquires Tomoro (~150 FDEs).</text>
  <text x="70"  y="204" class="box-t">TPG / Bain / Advent / Brookfield.</text>

  <rect x="340" y="130" width="250" height="80" class="box anth"/>
  <text x="355" y="152" class="box-t">Claude for Small Business ships:</text>
  <text x="355" y="170" class="box-t">15 skills inside Claude Cowork,</text>
  <text x="355" y="188" class="box-t">connectors to QuickBooks, Stripe,</text>
  <text x="355" y="204" class="box-t">PayPal, Square, HubSpot, Canva.</text>

  <rect x="625" y="130" width="270" height="80" class="box goog"/>
  <text x="640" y="152" class="box-t">Android Show: Gemini Intelligence</text>
  <text x="640" y="170" class="box-t">in Android 17 + Chrome auto browse</text>
  <text x="640" y="188" class="box-t">(Gemini 3.1) + Googlebook laptops</text>
  <text x="640" y="204" class="box-t">+ vibe-coded widgets, Magic Pointer.</text>

  <!-- Row 2: Channel target -->
  <rect x="55"  y="230" width="250" height="80" class="box oai"/>
  <text x="70"  y="252" class="box-t">Forward-deployed engineering</text>
  <text x="70"  y="270" class="box-t">inside Fortune 500 + regulated</text>
  <text x="70"  y="288" class="box-t">verticals. OpenAI majority-owns.</text>
  <text x="70"  y="304" class="box-t">Capgemini joined May 13.</text>

  <rect x="340" y="230" width="250" height="80" class="box anth"/>
  <text x="355" y="252" class="box-t">U.S. SMBs (30M+ businesses).</text>
  <text x="355" y="270" class="box-t">No extra license cost beyond</text>
  <text x="355" y="288" class="box-t">existing Claude plan. 10-city</text>
  <text x="355" y="304" class="box-t">free-training tour from Chicago.</text>

  <rect x="625" y="230" width="270" height="80" class="box goog"/>
  <text x="640" y="252" class="box-t">3B+ Android users + Chrome on</text>
  <text x="640" y="270" class="box-t">desktop. Late-June rollout (Android</text>
  <text x="640" y="288" class="box-t">12+, 4GB RAM). Googlebooks ship</text>
  <text x="640" y="304" class="box-t">fall 2026 (Acer / Asus / Dell / HP / Lenovo).</text>

  <!-- Row 3: Distribution shape -->
  <rect x="55"  y="330" width="250" height="80" class="box oai"/>
  <text x="70"  y="352" class="box-t">SI/PE-backed consultancy.</text>
  <text x="70"  y="370" class="box-t">OpenAI sells model + deployment</text>
  <text x="70"  y="388" class="box-t">labor as one bundle. Roll-up of</text>
  <text x="70"  y="404" class="box-t">applied-AI shops over time.</text>

  <rect x="340" y="330" width="250" height="80" class="box anth"/>
  <text x="355" y="352" class="box-t">Skill packs + connectors as the</text>
  <text x="355" y="370" class="box-t">distribution surface. Lives inside</text>
  <text x="355" y="388" class="box-t">tools SMBs already pay for —</text>
  <text x="355" y="404" class="box-t">no new platform to learn.</text>

  <rect x="625" y="330" width="270" height="80" class="box goog"/>
  <text x="640" y="352" class="box-t">OS-level: the agent IS the system.</text>
  <text x="640" y="370" class="box-t">App boundaries flattened; Gemini</text>
  <text x="640" y="388" class="box-t">moves across apps with screen</text>
  <text x="640" y="404" class="box-t">understanding + tool execution.</text>

  <!-- Row 4: Forward read -->
  <rect x="55"  y="430" width="250" height="80" class="box oai"/>
  <text x="70"  y="452" class="box-t">Bet: enterprise wins on services</text>
  <text x="70"  y="470" class="box-t">capacity, not on model lead.</text>
  <text x="70"  y="488" class="box-t">Closest analogue: Accenture's</text>
  <text x="70"  y="504" class="box-t">scale, built in 18 months.</text>

  <rect x="340" y="430" width="250" height="80" class="box anth"/>
  <text x="355" y="452" class="box-t">Bet: SMB long tail compounds</text>
  <text x="355" y="470" class="box-t">faster than enterprise top-down.</text>
  <text x="355" y="488" class="box-t">Cost-to-onboard ≈ 0; payback is</text>
  <text x="355" y="504" class="box-t">distribution density, not ACV.</text>

  <rect x="625" y="430" width="270" height="80" class="box goog"/>
  <text x="640" y="452" class="box-t">Bet: agent UX needs OS-depth</text>
  <text x="640" y="470" class="box-t">hooks (screen, intents, permissions)</text>
  <text x="640" y="488" class="box-t">that apps alone can't expose.</text>
  <text x="640" y="504" class="box-t">First-mover vs. iOS 27 (June 8).</text>
</svg>

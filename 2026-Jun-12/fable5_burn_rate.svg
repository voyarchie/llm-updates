<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 312" role="img" aria-label="Claude Fable 5 usage-limit burn rate relative to Opus 4.8, June 2026" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <title>Fable 5 usage-limit burn rate vs the rest of the Claude line, Jun 2026</title>

  <text x="370" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#9ca3af">Subscription burn rate — how fast each model eats your plan</text>
  <text x="370" y="46" text-anchor="middle" font-size="12" fill="#9ca3af">Relative to Opus 4.8 = 1.0× · Anthropic's own "≈2× faster than Opus" line · Jun 2026</text>

  <!-- gridlines at 0.5/1.0/1.5/2.0, scale 200px per 1.0x from x=200 -->
  <g stroke="#9ca3af" stroke-width="0.5" opacity="0.25">
    <line x1="300" y1="64" x2="300" y2="250"/>
    <line x1="400" y1="64" x2="400" y2="250"/>
    <line x1="500" y1="64" x2="500" y2="250"/>
    <line x1="600" y1="64" x2="600" y2="250"/>
  </g>
  <g font-size="10" fill="#9ca3af" text-anchor="middle" opacity="0.8">
    <text x="200" y="266">0×</text>
    <text x="300" y="266">0.5×</text>
    <text x="400" y="266">1.0×</text>
    <text x="500" y="266">1.5×</text>
    <text x="600" y="266">2.0×</text>
  </g>

  <!-- Fable 5 = 2.0x -->
  <text x="190" y="98" text-anchor="end" font-size="11" font-weight="700" fill="#dc2626">Claude Fable 5</text>
  <rect x="200" y="82" width="400" height="24" rx="3" fill="#dc2626"/>
  <text x="608" y="98" font-size="11" font-weight="700" fill="#9ca3af">≈2.0×</text>

  <!-- Opus 4.8 = 1.0x baseline -->
  <text x="190" y="143" text-anchor="end" font-size="11" fill="#9ca3af">Claude Opus 4.8</text>
  <rect x="200" y="127" width="200" height="24" rx="3" fill="#d97706"/>
  <text x="408" y="143" font-size="11" fill="#9ca3af">1.0× (baseline)</text>

  <!-- Sonnet 4.5 ~ 0.3x -->
  <text x="190" y="188" text-anchor="end" font-size="11" fill="#9ca3af">Claude Sonnet 4.5</text>
  <rect x="200" y="172" width="60" height="24" rx="3" fill="#059669"/>
  <text x="268" y="188" font-size="11" fill="#9ca3af">≈0.3× (a workday on one window)</text>

  <text x="200" y="232" font-size="11" fill="#9ca3af" opacity="0.9">Reported single-day spend on a Max plan: Simon Willison ≈$110 (one 78M-token session ≈$99); Theo / T3 &gt;$1,000.</text>

  <text x="40" y="294" font-size="9.5" fill="#9ca3af" opacity="0.8">Relative consumption of subscription usage limits, not API price. Anthropic states Fable 5 "uses your limits ≈2× faster than Opus." Sonnet figure is directional. Sources: Anthropic in-product copy, Developers Digest, Decrypt.</text>
</svg>

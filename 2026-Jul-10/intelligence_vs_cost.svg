<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Scatter plot of Artificial Analysis Intelligence Index (max reasoning effort, vertical axis) against output price per million tokens (horizontal axis) for the frontier field on July 10 2026. Claude Fable 5 scores 60 at 50 dollars output. GPT-5.6 Sol scores 59 at 30 dollars output, sitting almost level with Fable 5 but well to its left. Claude Opus 4.8 scores 56 at 25 dollars. GPT-5.6 Terra scores 55 at 15 dollars. Grok 4.5 scores 54 at 6 dollars. GPT-5.6 Luna scores 51 at 6 dollars. GPT-5.6 Sol is one index point behind Fable 5 while costing roughly one third as much per task.">
  <title>Intelligence Index vs output price — the July 10 field</title>

  <!-- theme-neutral palette: saturated fills carry white text on light and dark; slate labels/axis read on both -->
  <text x="24" y="30" font-size="19" font-weight="700" fill="#475569">Intelligence vs cost — the July 10 field</text>
  <text x="24" y="51" font-size="12.5" fill="#94a3b8">AA Intelligence Index (max effort) vs output $/Mtok. Up = smarter, left = cheaper. The independent number GPT-5.6 was missing yesterday.</text>

  <!-- Y axis (Intelligence Index 48..62) : y = 360 - (idx-48)*19.29 -->
  <line x1="90" y1="88" x2="90" y2="360" stroke="#94a3b8" stroke-width="1"/>
  <!-- horizontal gridlines at idx 50,54,58,62 -->
  <line x1="90" y1="321.6" x2="790" y2="321.6" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="90" y1="244.3" x2="790" y2="244.3" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="90" y1="167.1" x2="790" y2="167.1" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="90" y1="89.9" x2="790" y2="89.9" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="82" y="325.6" font-size="10.5" fill="#94a3b8" text-anchor="end">50</text>
  <text x="82" y="248.3" font-size="10.5" fill="#94a3b8" text-anchor="end">54</text>
  <text x="82" y="171.1" font-size="10.5" fill="#94a3b8" text-anchor="end">58</text>
  <text x="82" y="93.9" font-size="10.5" fill="#94a3b8" text-anchor="end">62</text>
  <text x="30" y="230" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90 30 230)">Intelligence Index (higher is smarter)</text>

  <!-- X axis (output $/Mtok 0..52) : x = 90 + price*13.46 -->
  <line x1="90" y1="360" x2="790" y2="360" stroke="#94a3b8" stroke-width="1"/>
  <line x1="171" y1="88" x2="171" y2="360" stroke="#eef2f7" stroke-width="0.5"/>
  <line x1="292" y1="88" x2="292" y2="360" stroke="#eef2f7" stroke-width="0.5"/>
  <line x1="426" y1="88" x2="426" y2="360" stroke="#eef2f7" stroke-width="0.5"/>
  <line x1="494" y1="88" x2="494" y2="360" stroke="#eef2f7" stroke-width="0.5"/>
  <line x1="763" y1="88" x2="763" y2="360" stroke="#eef2f7" stroke-width="0.5"/>
  <text x="90" y="378" font-size="10.5" fill="#94a3b8" text-anchor="middle">$0</text>
  <text x="292" y="378" font-size="10.5" fill="#94a3b8" text-anchor="middle">$15</text>
  <text x="426" y="378" font-size="10.5" fill="#94a3b8" text-anchor="middle">$25</text>
  <text x="494" y="378" font-size="10.5" fill="#94a3b8" text-anchor="middle">$30</text>
  <text x="763" y="378" font-size="10.5" fill="#94a3b8" text-anchor="middle">$50</text>
  <text x="440" y="400" font-size="11" fill="#94a3b8" text-anchor="middle">output price ($ per million tokens) &#8212; cheaper is left</text>

  <!-- the value gap: dashed connector Sol -> Fable 5 -->
  <line x1="503" y1="147" x2="754" y2="130" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="628" y="126" font-size="11" font-weight="700" fill="#0d9488" text-anchor="middle">1 index pt apart</text>
  <text x="628" y="140" font-size="10" fill="#0d9488" text-anchor="middle">&#8776;&#8531; the per-task cost</text>

  <!-- points -->
  <!-- Fable 5: idx 60, $50 -> (763,129) -->
  <circle cx="763" cy="129" r="9" fill="#6d28d9" stroke="#ffffff" stroke-width="2"/>
  <text x="750" y="118" font-size="12.5" font-weight="700" fill="#475569" text-anchor="end">Claude Fable 5</text>
  <text x="750" y="132" font-size="10" fill="#94a3b8" text-anchor="end">60 &#183; $10/$50</text>

  <!-- GPT-5.6 Sol: idx 59, $30 -> (494,148) -->
  <circle cx="494" cy="148" r="9" fill="#1e40af" stroke="#ffffff" stroke-width="2"/>
  <text x="508" y="145" font-size="12.5" font-weight="700" fill="#475569" text-anchor="start">GPT-5.6 Sol</text>
  <text x="508" y="159" font-size="10" fill="#94a3b8" text-anchor="start">59 &#183; $5/$30 &#183; #2</text>

  <!-- Opus 4.8: idx 56, $25 -> (426,206) -->
  <circle cx="426" cy="206" r="9" fill="#9333ea" stroke="#ffffff" stroke-width="2"/>
  <text x="440" y="203" font-size="12.5" font-weight="700" fill="#475569" text-anchor="start">Claude Opus 4.8</text>
  <text x="440" y="217" font-size="10" fill="#94a3b8" text-anchor="start">56 &#183; $5/$25</text>

  <!-- Terra: idx 55, $15 -> (292,225) -->
  <circle cx="292" cy="225" r="9" fill="#2563eb" stroke="#ffffff" stroke-width="2"/>
  <text x="306" y="222" font-size="12.5" font-weight="700" fill="#475569" text-anchor="start">GPT-5.6 Terra</text>
  <text x="306" y="236" font-size="10" fill="#94a3b8" text-anchor="start">55 &#183; $2.50/$15</text>

  <!-- Grok 4.5: idx 54, $6 -> (171,244) -->
  <circle cx="171" cy="244" r="9" fill="#0d9488" stroke="#ffffff" stroke-width="2"/>
  <text x="185" y="241" font-size="12.5" font-weight="700" fill="#475569" text-anchor="start">Grok 4.5</text>
  <text x="185" y="255" font-size="10" fill="#94a3b8" text-anchor="start">54 &#183; $2/$6</text>

  <!-- Luna: idx 51, $6 -> (171,302) -->
  <circle cx="171" cy="302" r="9" fill="#3b82f6" stroke="#ffffff" stroke-width="2"/>
  <text x="185" y="299" font-size="12.5" font-weight="700" fill="#475569" text-anchor="start">GPT-5.6 Luna</text>
  <text x="185" y="313" font-size="10" fill="#94a3b8" text-anchor="start">51 &#183; $1/$6</text>

</svg>

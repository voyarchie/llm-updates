<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Long-context LLM architecture landscape — May 2026</title>
  <desc>Quadrant chart placing TTT-E2E, full attention, sparse attention variants, and SSM/RNN-style architectures on axes of loss-scaling fidelity and inference latency growth.</desc>

  <style>
    .bg { fill: none; }
    .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
    .sub   { font-size: 12px; fill: #475569; }
    .axis  { stroke: #94a3b8; stroke-width: 1.4; }
    .grid  { stroke: #94a3b8; stroke-width: 0.6; stroke-dasharray: 3 4; opacity: 0.55; }
    .axis-label { font-size: 12px; fill: #334155; }
    .tick  { font-size: 11px; fill: #475569; }

    .q-label    { font-size: 11px; fill: #475569; font-style: italic; }
    .pt-text    { font-size: 12px; fill: #0f172a; font-weight: 600; }
    .pt-sub     { font-size: 11px; fill: #334155; }

    .full   { fill: #fca5a5; stroke: #b91c1c; stroke-width: 2; }
    .duo    { fill: #fcd34d; stroke: #b45309; stroke-width: 2; }
    .sparse { fill: #a7f3d0; stroke: #047857; stroke-width: 2; }
    .ssm    { fill: #c4b5fd; stroke: #6d28d9; stroke-width: 2; }
    .ttt    { fill: #5eead4; stroke: #0f766e; stroke-width: 2.5; }

    .legend { font-size: 12px; fill: #334155; }
    .annot  { font-size: 11px; fill: #475569; font-style: italic; }

    @media (prefers-color-scheme: dark) {
      .title { fill: #f1f5f9; }
      .sub, .axis-label, .tick, .q-label, .legend, .annot { fill: #cbd5e1; }
      .axis, .grid { stroke: #475569; }
      .pt-text { fill: #f1f5f9; }
      .pt-sub  { fill: #e2e8f0; }
    }
  </style>

  <rect class="bg" width="920" height="540"/>

  <text class="title" x="32" y="32">Long-context LLM landscape — loss fidelity vs inference latency</text>
  <text class="sub"   x="32" y="52">3B-class models, ~164B training tokens. Sources: TTT-E2E (arXiv 2512.23675), DuoAttention (ICLR 2025), ASEntmax (ICLR 2026).</text>

  <!-- chart frame -->
  <g transform="translate(110, 90)">

    <!-- gridlines -->
    <line class="grid" x1="0" y1="0"  x2="720" y2="0"/>
    <line class="grid" x1="0" y1="80" x2="720" y2="80"/>
    <line class="grid" x1="0" y1="160" x2="720" y2="160"/>
    <line class="grid" x1="0" y1="240" x2="720" y2="240"/>
    <line class="grid" x1="0" y1="320" x2="720" y2="320"/>

    <line class="grid" x1="0"   y1="0" x2="0"   y2="400"/>
    <line class="grid" x1="180" y1="0" x2="180" y2="400"/>
    <line class="grid" x1="360" y1="0" x2="360" y2="400"/>
    <line class="grid" x1="540" y1="0" x2="540" y2="400"/>
    <line class="grid" x1="720" y1="0" x2="720" y2="400"/>

    <!-- axes -->
    <line class="axis" x1="0" y1="400" x2="720" y2="400"/>
    <line class="axis" x1="0" y1="0"   x2="0"   y2="400"/>

    <!-- axis labels -->
    <text class="axis-label" x="360" y="436" text-anchor="middle">Inference latency growth vs context length →</text>
    <text class="tick" x="0"   y="418" text-anchor="middle">constant</text>
    <text class="tick" x="180" y="418" text-anchor="middle">sub-linear</text>
    <text class="tick" x="360" y="418" text-anchor="middle">linear-ish</text>
    <text class="tick" x="540" y="418" text-anchor="middle">linear</text>
    <text class="tick" x="720" y="418" text-anchor="middle">quadratic</text>

    <text class="axis-label" x="-90" y="200" transform="rotate(-90, -90, 200)" text-anchor="middle">Loss fidelity vs full attention →</text>
    <text class="tick" x="-8" y="404" text-anchor="end">diverges</text>
    <text class="tick" x="-8" y="304" text-anchor="end">lags</text>
    <text class="tick" x="-8" y="204" text-anchor="end">close</text>
    <text class="tick" x="-8" y="104" text-anchor="end">matches</text>
    <text class="tick" x="-8" y="8"   text-anchor="end">on par</text>

    <!-- quadrant labels -->
    <text class="q-label" x="20"  y="20">good fidelity / fast → frontier</text>
    <text class="q-label" x="540" y="20">good fidelity / slow → classic</text>
    <text class="q-label" x="20"  y="395">poor fidelity / fast → old SSM/RNN</text>
    <text class="q-label" x="540" y="395">poor fidelity / slow → avoid</text>

    <!-- points -->
    <!-- TTT-E2E: constant latency, matches full -->
    <circle class="ttt" cx="40"  cy="80" r="14"/>
    <text class="pt-text" x="60" y="76">TTT-E2E (sliding-window + test-time training)</text>
    <text class="pt-sub"  x="60" y="92">2.7× @ 128K, 35× @ 2M vs full attention; meta-learned updates</text>

    <!-- Full attention: linear latency growth per token, matches loss by construction -->
    <circle class="full" cx="700" cy="80" r="14"/>
    <text class="pt-text" x="590" y="76" text-anchor="end">Full attention (Transformer)</text>
    <text class="pt-sub"  x="590" y="92" text-anchor="end">reference loss; quadratic KV cost</text>

    <!-- DuoAttention: sub-linear, close to full -->
    <circle class="duo" cx="200" cy="140" r="12"/>
    <text class="pt-text" x="218" y="138">DuoAttention (retrieval + streaming heads)</text>
    <text class="pt-sub"  x="218" y="154">asymmetric KV; very close to full</text>

    <!-- ASEntmax / sparse: slightly lagging full -->
    <circle class="sparse" cx="300" cy="180" r="12"/>
    <text class="pt-text" x="318" y="178">ASEntmax / adaptive sparse</text>
    <text class="pt-sub"  x="318" y="194">α-entmax, O(sL) gradient; ICLR 2026</text>

    <!-- Mamba 2 -->
    <circle class="ssm" cx="40"  cy="320" r="12"/>
    <text class="pt-text" x="60"  y="316">Mamba 2</text>
    <text class="pt-sub"  x="60"  y="332">constant latency; loss diverges at long context</text>

    <!-- Gated DeltaNet -->
    <circle class="ssm" cx="80"  cy="360" r="12"/>
    <text class="pt-text" x="100" y="356">Gated DeltaNet</text>
    <text class="pt-sub"  x="100" y="372">same family; gating helps but doesn't close gap</text>

    <!-- arrow from full-attn to TTT-E2E illustrating the move -->
    <path d="M 700 95 Q 380 170 60 90" stroke="#0f766e" stroke-width="2" stroke-dasharray="4 4" fill="none" marker-end="url(#tealhead)"/>
    <text class="annot" x="380" y="158" text-anchor="middle">the architecture move of 2026:</text>
    <text class="annot" x="380" y="172" text-anchor="middle">treat long context as continual learning, not architecture</text>
  </g>

  <defs>
    <marker id="tealhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <!-- legend -->
  <g transform="translate(620, 92)">
    <circle class="ttt"    cx="8" cy="0"  r="7"/>
    <text class="legend"   x="22" y="4">Test-time training</text>
    <circle class="full"   cx="8" cy="22" r="7"/>
    <text class="legend"   x="22" y="26">Full attention</text>
    <circle class="duo"    cx="8" cy="44" r="7"/>
    <text class="legend"   x="22" y="48">Asymmetric KV</text>
    <circle class="sparse" cx="8" cy="66" r="7"/>
    <text class="legend"   x="22" y="70">Sparse attention</text>
    <circle class="ssm"    cx="8" cy="88" r="7"/>
    <text class="legend"   x="22" y="92">SSM / RNN</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">The 2026 AI stack: LLM + World Foundation Model + Large Geospatial Model</title>
  <desc id="desc">Stacked layered diagram showing how the language layer, world foundation model layer, and geospatial layer compose into agent and robot products. Mid-saturation fills with white text render legibly against light or dark backgrounds.</desc>

  <!-- Axis-style left rail (neutral gray for both themes) -->
  <line x1="56" y1="50" x2="56" y2="420" stroke="#6b7280" stroke-width="2"/>
  <text x="44" y="56" text-anchor="end" fill="#6b7280" font-size="12">capability</text>
  <text x="44" y="416" text-anchor="end" fill="#6b7280" font-size="12">substrate</text>

  <!-- Layer 4 — products / agents -->
  <rect x="80" y="60" width="760" height="64" rx="10" fill="#9333ea" stroke="#581c87" stroke-width="2"/>
  <text x="100" y="92" fill="#ffffff" font-size="18" font-weight="600">Products</text>
  <text x="100" y="112" fill="#ffffff" font-size="13">agentic chat · coding agents · embodied robots · driving stacks · simulators · games</text>

  <!-- Layer 3 — LLMs -->
  <rect x="80" y="140" width="370" height="80" rx="10" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="100" y="170" fill="#ffffff" font-size="17" font-weight="600">Large Language Models</text>
  <text x="100" y="190" fill="#ffffff" font-size="12">GPT-5.5 · Claude Opus 4.7 · Gemini 3.1 Pro</text>
  <text x="100" y="206" fill="#ffffff" font-size="12">Mistral Medium 3.5 · DeepSeek V4-Pro · Kimi K2.6</text>

  <!-- Layer 3 — World Foundation Models -->
  <rect x="470" y="140" width="370" height="80" rx="10" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
  <text x="490" y="170" fill="#ffffff" font-size="17" font-weight="600">World Foundation Models</text>
  <text x="490" y="190" fill="#ffffff" font-size="12">Genie 3 (DeepMind) · Marble (World Labs)</text>
  <text x="490" y="206" fill="#ffffff" font-size="12">Cosmos (NVIDIA) · AMI Labs (LeCun)</text>

  <!-- Layer 2 — Geospatial / scene representation -->
  <rect x="80" y="240" width="760" height="64" rx="10" fill="#0ea5e9" stroke="#075985" stroke-width="2"/>
  <text x="100" y="270" fill="#ffffff" font-size="17" font-weight="600">Large Geospatial Models &amp; scene representation</text>
  <text x="100" y="290" fill="#ffffff" font-size="12">Niantic LGM · Gaussian splat banks · USD scene graphs · NeRF/3DGS persistence layers</text>

  <!-- Layer 1 — substrate -->
  <rect x="80" y="320" width="760" height="64" rx="10" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <text x="100" y="350" fill="#ffffff" font-size="17" font-weight="600">Substrate</text>
  <text x="100" y="370" fill="#ffffff" font-size="12">Blackwell GPUs · video corpora · sim datasets · proprioceptive logs · streaming KV/state caches</text>

  <!-- Connector arrows -->
  <line x1="265" y1="220" x2="265" y2="240" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>
  <line x1="655" y1="220" x2="655" y2="240" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>
  <line x1="460" y1="304" x2="460" y2="320" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>
  <line x1="265" y1="140" x2="265" y2="124" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>
  <line x1="655" y1="140" x2="655" y2="124" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text x="80" y="412" fill="#6b7280" font-size="12">Layered view of the May 2026 stack: LLMs and World Foundation Models are now</text>
  <text x="80" y="428" fill="#6b7280" font-size="12">peers, not parent/child. They share substrate but specialise on different modalities.</text>
</svg>

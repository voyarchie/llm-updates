<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial">
  <defs>
    <style><![CDATA[
      .title { font-size: 16px; font-weight: 600; fill: #888; }
      .sub { font-size: 12px; fill: #888; }
      .axis { stroke: #888; stroke-width: 1; }
      .grid { stroke: #888; stroke-width: 0.5; stroke-dasharray: 3 4; opacity: 0.4; }
      .label { font-size: 11px; fill: #888; }
      .num { font-size: 11px; font-weight: 600; fill: #888; }
      .ar { fill: #6aa9ff; }
      .specd { fill: #f08a5d; }
      .mirror { fill: #b48ead; }
      .cdlm { fill: #66c2a5; }
      .annot { font-size: 11px; fill: #888; font-style: italic; }
    ]]></style>
  </defs>

  <text x="20" y="28" class="title">Decode-side inference speedups, May 2026 — beyond plain speculative decoding</text>
  <text x="20" y="48" class="sub">Wall-clock latency multipliers vs greedy autoregressive baseline (higher = faster), reasoning &amp; coding workloads</text>

  <!-- axes -->
  <line x1="200" y1="80" x2="200" y2="340" class="axis"/>
  <line x1="200" y1="340" x2="780" y2="340" class="axis"/>

  <!-- x ticks: 1x, 4x, 8x, 12x, 16x -->
  <g>
    <line x1="200" y1="80"  x2="200" y2="340" class="grid"/>
    <line x1="345" y1="80"  x2="345" y2="340" class="grid"/>
    <line x1="490" y1="80"  x2="490" y2="340" class="grid"/>
    <line x1="635" y1="80"  x2="635" y2="340" class="grid"/>
    <line x1="780" y1="80"  x2="780" y2="340" class="grid"/>
    <text x="200" y="358" class="label" text-anchor="middle">1×</text>
    <text x="345" y="358" class="label" text-anchor="middle">4×</text>
    <text x="490" y="358" class="label" text-anchor="middle">8×</text>
    <text x="635" y="358" class="label" text-anchor="middle">12×</text>
    <text x="780" y="358" class="label" text-anchor="middle">16×</text>
    <text x="490" y="378" class="label" text-anchor="middle">Latency speedup vs greedy AR (×)</text>
  </g>

  <!-- 1: AR baseline -->
  <text x="190" y="107" class="label" text-anchor="end">AR baseline</text>
  <rect x="200" y="92" width="36" height="20" class="ar"/>
  <text x="244" y="107" class="num">1.0×</text>

  <!-- 2: Vanilla speculative decoding ~2-3x. center 2.5x = 200 + (2.5-1)/15 * 580 = 200 + 58 = 258? scale: 1x->200, 16x->780, so per x = 580/15 = 38.66 -->
  <!-- 2.5x → 200 + 1.5*38.66 = 257.9 -->
  <text x="190" y="147" class="label" text-anchor="end">Speculative (2024)</text>
  <rect x="200" y="132" width="58" height="20" class="specd"/>
  <text x="266" y="147" class="num">2.5×</text>

  <!-- 3: EAGLE3 ~3.5x: 200 + 2.5*38.66 = 296.6 -->
  <text x="190" y="187" class="label" text-anchor="end">EAGLE3</text>
  <rect x="200" y="172" width="96" height="20" class="specd"/>
  <text x="304" y="187" class="num">3.5×</text>

  <!-- 4: Mirror-SD up to 5.8x: width = 4.8*38.66 = 185.6 -->
  <text x="190" y="227" class="label" text-anchor="end">Mirror-SD (Apple)</text>
  <rect x="200" y="212" width="186" height="20" class="mirror"/>
  <text x="394" y="227" class="num">2.8–5.8× (+30% vs EAGLE3)</text>

  <!-- 5: CDLM 14.5x: width = 13.5*38.66 = 521.9 -->
  <text x="190" y="267" class="label" text-anchor="end">CDLM (Together AI)</text>
  <rect x="200" y="252" width="522" height="20" class="cdlm"/>
  <text x="730" y="267" class="num">14.5×</text>

  <!-- 6: TLT (RL rollout) 1.7-3.1x: width = 2.1*38.66 = 81.2 -->
  <text x="190" y="307" class="label" text-anchor="end">TLT (RL rollout)</text>
  <rect x="200" y="292" width="81" height="20" class="ar" opacity="0.6"/>
  <text x="289" y="307" class="num">1.7–3.1×</text>

  <!-- legend / categories -->
  <text x="20" y="402" class="annot">Apple's Mirror-SD adds NPU↔GPU heterogeneous parallelism on top of EAGLE3; CDLM uses block-wise diffusion with KV-cache compatibility.</text>
</svg>

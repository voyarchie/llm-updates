<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-label="Inference speedup ladder for May 2026 — composable accelerators for transformer LLMs">
  <title>Inference speedup ladder, May 2026</title>
  <desc>Stacked, composable inference accelerators with reported speedups: FlashAttention-4 on Blackwell, hybrid sparse/compressed KV cache (DeepSeek V4-class), speculative decoding (EAGLE-3), and consistency diffusion sampling (CDLM) as an alternative decode path.</desc>

  <style>
    .lbl     { font: 600 14px system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #ffffff; }
    .sub     { font: 500 12px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.92; }
    .axis    { font: 600 12px system-ui, -apple-system, sans-serif; fill: #6b7280; }
    .axisN   { font: 700 13px system-ui, -apple-system, sans-serif; fill: #6b7280; }
    .ttl     { font: 700 16px system-ui, -apple-system, sans-serif; fill: #6b7280; }
    .note    { font: 500 11px system-ui, -apple-system, sans-serif; fill: #9ca3af; }
    .alt     { font: 600 13px system-ui, -apple-system, sans-serif; fill: #ffffff; }
  </style>

  <text x="20" y="30" class="ttl">Composable inference accelerators for an LLM serving stack (May 2026)</text>
  <text x="20" y="50" class="note">Bars show widely cited per-layer speedups vs. the prior best baseline. Effects compose multiplicatively when stacked.</text>

  <!-- baseline marker -->
  <line x1="120" y1="80" x2="120" y2="380" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="395" class="axisN" text-anchor="middle">1x</text>
  <text x="220" y="395" class="axis" text-anchor="middle">~1.3x</text>
  <text x="350" y="395" class="axis" text-anchor="middle">~3.7x KV/FLOPs</text>
  <text x="500" y="395" class="axis" text-anchor="middle">2–6x decode</text>
  <text x="640" y="395" class="axis" text-anchor="middle">14.5x alt-path</text>
  <text x="20" y="408" class="note">x-axis: cumulative speedup multiplier vs. dense FA3 baseline.</text>

  <!-- Layer 1: FlashAttention-4 -->
  <rect x="120" y="90" width="100" height="58" rx="6" fill="#2563eb" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="170" y="115" class="lbl" text-anchor="middle">FlashAttention-4</text>
  <text x="170" y="133" class="sub" text-anchor="middle">Blackwell-aware kernel</text>
  <text x="232" y="120" class="axis">~1.3x over cuDNN 9.13</text>
  <text x="232" y="138" class="axis">~2.7x over Triton</text>

  <!-- Layer 2: Hybrid sparse + compressed KV (DeepSeek V4-class) -->
  <rect x="120" y="160" width="230" height="58" rx="6" fill="#0ea5e9" stroke="#075985" stroke-width="1.5"/>
  <text x="235" y="185" class="lbl" text-anchor="middle">Hybrid sparse + compressed KV (DeepSeek V4 CSA + HCA)</text>
  <text x="235" y="203" class="sub" text-anchor="middle">10% KV cache, 27% per-token FLOPs at 1M tok</text>
  <text x="362" y="190" class="axis">cuts memory + compute</text>
  <text x="362" y="208" class="axis">at long context</text>

  <!-- Layer 3: Speculative decoding -->
  <rect x="120" y="230" width="380" height="58" rx="6" fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
  <text x="310" y="255" class="lbl" text-anchor="middle">Speculative decoding (EAGLE-3 / Medusa, vLLM/SGLang/TRT-LLM)</text>
  <text x="310" y="273" class="sub" text-anchor="middle">2–6x decode-step reduction at preserved quality</text>
  <text x="512" y="260" class="axis">production default</text>
  <text x="512" y="278" class="axis">in major serving stacks</text>

  <!-- Layer 4 (alt path): Consistency diffusion -->
  <rect x="120" y="300" width="520" height="58" rx="6" fill="#9333ea" stroke="#581c87" stroke-width="1.5"/>
  <text x="380" y="325" class="lbl" text-anchor="middle">Consistency diffusion LM (CDLM, post-training recipe; Mercury Coder)</text>
  <text x="380" y="343" class="sub" text-anchor="middle">3.6–14.5x latency reduction on coding/math; KV-cacheable block-causal mask</text>
  <text x="652" y="330" class="alt">alt</text>
  <text x="652" y="348" class="alt">decode path</text>

  <!-- Footer note -->
  <rect x="20" y="425" width="720" height="0.5" fill="#9ca3af"/>
  <text x="20" y="445" class="note">Composing FA4 + hybrid attention + speculative decoding routinely yields &gt;10x end-to-end vs. a 2024-era dense stack. Diffusion LMs are a parallel decode path, not strictly stackable.</text>
</svg>

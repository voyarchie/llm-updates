<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" role="img" aria-label="Architecture landscape for production LLMs in May 2026">
  <title>Production LLM architecture landscape, May 2026</title>
  <desc>Bubble chart positioning architectural families on long-context efficiency (x-axis) versus generation-quality ceiling (y-axis). Bubble size represents how widely the family is shipping in production today.</desc>

  <style>
    .ttl   { font: 700 16px system-ui, -apple-system, sans-serif; fill: #6b7280; }
    .note  { font: 500 11px system-ui, -apple-system, sans-serif; fill: #9ca3af; }
    .axis  { font: 600 12px system-ui, -apple-system, sans-serif; fill: #6b7280; }
    .lbl   { font: 700 13px system-ui, -apple-system, sans-serif; fill: #ffffff; }
    .sub   { font: 500 11px system-ui, -apple-system, sans-serif; fill: #ffffff; opacity: 0.92; }
    .key   { font: 600 12px system-ui, -apple-system, sans-serif; fill: #6b7280; }
  </style>

  <text x="20" y="28" class="ttl">Architecture landscape for production LLMs (May 2026)</text>
  <text x="20" y="48" class="note">Position is qualitative; bubble size = production breadth (number of shipping models in this family at end-of-month).</text>

  <!-- axes -->
  <line x1="80" y1="400" x2="740" y2="400" stroke="#9ca3af" stroke-width="1.2"/>
  <line x1="80" y1="80"  x2="80"  y2="400" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="410" y="430" class="axis" text-anchor="middle">long-context efficiency (FLOPs &amp; KV per token at 1M tok) →</text>
  <text x="60"  y="240" class="axis" text-anchor="middle" transform="rotate(-90 60 240)">generation-quality ceiling →</text>

  <!-- gridlines -->
  <line x1="246" y1="80"  x2="246" y2="400" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="410" y1="80"  x2="410" y2="400" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="574" y1="80"  x2="574" y2="400" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80"  y1="160" x2="740" y2="160" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80"  y1="240" x2="740" y2="240" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80"  y1="320" x2="740" y2="320" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Dense transformer (legacy) -->
  <circle cx="180" cy="200" r="32" fill="#6b7280" fill-opacity="0.85" stroke="#374151" stroke-width="1.5"/>
  <text x="180" y="200" class="lbl" text-anchor="middle">Dense</text>
  <text x="180" y="216" class="sub" text-anchor="middle">transformer</text>

  <!-- Sparse FFN MoE (Mixtral/DeepSeek V3 lineage) -->
  <circle cx="320" cy="160" r="40" fill="#2563eb" fill-opacity="0.9" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="320" y="158" class="lbl" text-anchor="middle">Sparse-FFN MoE</text>
  <text x="320" y="174" class="sub" text-anchor="middle">Mixtral, GLM-5.1</text>

  <!-- MoE attention (SwitchHead, HyperMoE, attn-router) -->
  <circle cx="430" cy="120" r="22" fill="#0ea5e9" fill-opacity="0.9" stroke="#075985" stroke-width="1.5"/>
  <text x="430" y="119" class="lbl" text-anchor="middle">MoE-attn</text>
  <text x="430" y="134" class="sub" text-anchor="middle">SwitchHead</text>

  <!-- Hybrid SSM + Attention (Mamba-3, Nemotron 3 Nano Omni, Jamba, Granite 4) -->
  <circle cx="560" cy="170" r="36" fill="#16a34a" fill-opacity="0.9" stroke="#14532d" stroke-width="1.5"/>
  <text x="560" y="168" class="lbl" text-anchor="middle">Hybrid SSM+Attn</text>
  <text x="560" y="184" class="sub" text-anchor="middle">Nemotron, Mamba-3, Jamba</text>

  <!-- DeepSeek V4-class hybrid sparse/compressed attention -->
  <circle cx="640" cy="130" r="28" fill="#22c55e" fill-opacity="0.9" stroke="#14532d" stroke-width="1.5"/>
  <text x="640" y="128" class="lbl" text-anchor="middle">CSA + HCA</text>
  <text x="640" y="143" class="sub" text-anchor="middle">DeepSeek V4</text>

  <!-- Diffusion LM -->
  <circle cx="430" cy="290" r="22" fill="#9333ea" fill-opacity="0.9" stroke="#581c87" stroke-width="1.5"/>
  <text x="430" y="288" class="lbl" text-anchor="middle">Diffusion LM</text>
  <text x="430" y="304" class="sub" text-anchor="middle">CDLM, Mercury</text>

  <!-- Reasoning RL post-training overlay (annotation, not architecture) -->
  <circle cx="270" cy="105" r="18" fill="#dc2626" fill-opacity="0.9" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="270" y="105" class="lbl" text-anchor="middle">RL-PT</text>
  <text x="270" y="120" class="sub" text-anchor="middle">overlay</text>

  <!-- arrow showing architectural drift -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <path d="M 200 215 C 290 200, 360 175, 410 145" fill="none" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="290" y="265" class="key">drift since 2024: dense → sparse → hybrid</text>

  <!-- Legend -->
  <rect x="80" y="365" width="660" height="28" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="100" cy="379" r="6" fill="#6b7280"/>          <text x="112" y="383" class="key">Dense (legacy)</text>
  <circle cx="220" cy="379" r="6" fill="#2563eb"/>          <text x="232" y="383" class="key">Sparse-FFN MoE</text>
  <circle cx="350" cy="379" r="6" fill="#0ea5e9"/>          <text x="362" y="383" class="key">MoE in attention</text>
  <circle cx="480" cy="379" r="6" fill="#16a34a"/>          <text x="492" y="383" class="key">Hybrid SSM + Attention</text>
  <circle cx="640" cy="379" r="6" fill="#9333ea"/>          <text x="652" y="383" class="key">Diffusion LM</text>

  <text x="20" y="465" class="note">RL post-training (red) is an overlay, not a base architecture — it stacks on top of any of the others.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" role="img" aria-label="Microsoft's seven in-house MAI models announced at Build 2026" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <title>Microsoft's seven MAI models — Build 2026</title>

  <text x="410" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#9ca3af">Microsoft's seven in-house MAI models — Build 2026 (Jun 2)</text>
  <text x="410" y="46" text-anchor="middle" font-size="12" fill="#9ca3af">First frontier-quality family trained from scratch — no third-party distillation</text>

  <!-- Lane 1: Reasoning -->
  <rect x="20" y="78" width="145" height="26" rx="6" fill="#7c3aed"/>
  <text x="92" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">Reasoning</text>
  <rect x="20" y="116" width="145" height="94" rx="6" fill="#7c3aed" opacity="0.14" stroke="#7c3aed" stroke-width="1"/>
  <text x="92" y="139" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">MAI-Thinking-1</text>
  <text x="92" y="159" text-anchor="middle" font-size="10" fill="#7c3aed">35B-active sparse MoE</text>
  <text x="92" y="176" text-anchor="middle" font-size="10" fill="#7c3aed">256K context</text>
  <text x="92" y="196" text-anchor="middle" font-size="10" fill="#7c3aed">AIME'26 94.5%</text>

  <!-- Lane 2: Coding -->
  <rect x="180" y="78" width="145" height="26" rx="6" fill="#2563eb"/>
  <text x="252" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">Coding</text>
  <rect x="180" y="116" width="145" height="94" rx="6" fill="#2563eb" opacity="0.14" stroke="#2563eb" stroke-width="1"/>
  <text x="252" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">MAI-Code-1-Flash</text>
  <text x="252" y="166" text-anchor="middle" font-size="10" fill="#2563eb">live in GitHub Copilot</text>
  <text x="252" y="183" text-anchor="middle" font-size="10" fill="#2563eb">+ VS Code</text>

  <!-- Lane 3: Image -->
  <rect x="340" y="78" width="145" height="26" rx="6" fill="#db2777"/>
  <text x="412" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">Image</text>
  <rect x="340" y="116" width="145" height="44" rx="6" fill="#db2777" opacity="0.14" stroke="#db2777" stroke-width="1"/>
  <text x="412" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#db2777">MAI-Image-2.5</text>
  <text x="412" y="151" text-anchor="middle" font-size="10" fill="#db2777">&gt; Nano Banana Pro (Arena)</text>
  <rect x="340" y="166" width="145" height="44" rx="6" fill="#db2777" opacity="0.14" stroke="#db2777" stroke-width="1"/>
  <text x="412" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#db2777">MAI-Image-2.5 Flash</text>
  <text x="412" y="201" text-anchor="middle" font-size="10" fill="#db2777">ultra-efficient variant</text>

  <!-- Lane 4: Voice -->
  <rect x="500" y="78" width="145" height="26" rx="6" fill="#059669"/>
  <text x="572" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">Voice</text>
  <rect x="500" y="116" width="145" height="44" rx="6" fill="#059669" opacity="0.14" stroke="#059669" stroke-width="1"/>
  <text x="572" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">MAI-Voice-2</text>
  <text x="572" y="151" text-anchor="middle" font-size="10" fill="#059669">15 languages · voice clone</text>
  <rect x="500" y="166" width="145" height="44" rx="6" fill="#059669" opacity="0.14" stroke="#059669" stroke-width="1"/>
  <text x="572" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">MAI-Voice-2 Flash</text>
  <text x="572" y="201" text-anchor="middle" font-size="10" fill="#059669">low-latency variant</text>

  <!-- Lane 5: Transcription -->
  <rect x="660" y="78" width="145" height="26" rx="6" fill="#d97706"/>
  <text x="732" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">Transcription</text>
  <rect x="660" y="116" width="145" height="94" rx="6" fill="#d97706" opacity="0.14" stroke="#d97706" stroke-width="1"/>
  <text x="732" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">MAI-Transcribe-1.5</text>
  <text x="732" y="166" text-anchor="middle" font-size="10" fill="#d97706">SOTA accuracy</text>
  <text x="732" y="183" text-anchor="middle" font-size="10" fill="#d97706">~5x faster than rivals</text>

  <!-- Strategic banner -->
  <rect x="20" y="232" width="785" height="56" rx="8" fill="#9ca3af" opacity="0.12" stroke="#9ca3af" stroke-width="1"/>
  <text x="412" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#9ca3af">Trained from scratch on commercially licensed data — Microsoft's clean-provenance wedge</text>
  <text x="412" y="276" text-anchor="middle" font-size="11" fill="#9ca3af">Private preview on Azure AI Foundry · also served via OpenRouter, Fireworks, Baseten</text>

  <text x="20" y="330" font-size="10" fill="#9ca3af" opacity="0.85">Sources: microsoft.ai Build 2026 keynote, TechTimes, Euronews, testingcatalog. Dates in Los Angeles time.</text>
</svg>

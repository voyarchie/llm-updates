<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <title>Small Language Model landscape, May 2026</title>
  <desc>Scatter of SLMs by active parameter count vs. on-device deployability. Mid-saturation fills with white text and neutral-gray axes for light/dark mode legibility.</desc>

  <!-- Plot area background (transparent so theme bg shows through) -->
  <rect x="0" y="0" width="880" height="480" fill="none"/>

  <!-- Axes -->
  <line x1="80" y1="420" x2="840" y2="420" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="80" y1="40"  x2="80"  y2="420" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="460" y="460" text-anchor="middle" fill="#6b7280">Active parameters (log scale)</text>
  <text x="22" y="230" text-anchor="middle" fill="#6b7280" transform="rotate(-90 22 230)">On-device deployability →</text>

  <!-- X-axis tick labels -->
  <text x="160" y="438" text-anchor="middle" fill="#9ca3af" font-size="11">300M</text>
  <text x="320" y="438" text-anchor="middle" fill="#9ca3af" font-size="11">1B</text>
  <text x="480" y="438" text-anchor="middle" fill="#9ca3af" font-size="11">3B</text>
  <text x="640" y="438" text-anchor="middle" fill="#9ca3af" font-size="11">8B</text>
  <text x="800" y="438" text-anchor="middle" fill="#9ca3af" font-size="11">30B</text>

  <!-- Y-axis tick labels -->
  <text x="68" y="404" text-anchor="end" fill="#9ca3af" font-size="11">phone</text>
  <text x="68" y="304" text-anchor="end" fill="#9ca3af" font-size="11">laptop</text>
  <text x="68" y="204" text-anchor="end" fill="#9ca3af" font-size="11">workstation</text>
  <text x="68" y="104" text-anchor="end" fill="#9ca3af" font-size="11">single-GPU</text>

  <!-- Gridlines -->
  <g stroke="#374151" stroke-opacity="0.18" stroke-dasharray="3 4">
    <line x1="160" y1="40" x2="160" y2="420"/>
    <line x1="320" y1="40" x2="320" y2="420"/>
    <line x1="480" y1="40" x2="480" y2="420"/>
    <line x1="640" y1="40" x2="640" y2="420"/>
    <line x1="800" y1="40" x2="800" y2="420"/>
    <line x1="80" y1="100" x2="840" y2="100"/>
    <line x1="80" y1="200" x2="840" y2="200"/>
    <line x1="80" y1="300" x2="840" y2="300"/>
  </g>

  <!-- Region label: "Edge band" -->
  <rect x="80" y="340" width="380" height="80" fill="#16a34a" fill-opacity="0.07" stroke="#16a34a" stroke-opacity="0.35" stroke-dasharray="4 4"/>
  <text x="270" y="380" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="600">on-device-feasible band</text>

  <!-- Data points: (active_params_log_pos_x, deployability_y, fill, label) -->
  <!-- Apple Foundation Models (~3B on-device): high deployability, ~3B -->
  <g>
    <circle cx="480" cy="380" r="9" fill="#0ea5e9" stroke="#075985" stroke-width="1.5"/>
    <text x="495" y="384" fill="#0ea5e9" font-weight="600">Apple FM 3B (on-device)</text>
  </g>

  <!-- Gemma 3 Nano ~1B -->
  <g>
    <circle cx="320" cy="395" r="9" fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
    <text x="335" y="399" fill="#16a34a" font-weight="600">Gemma 3 Nano 1B</text>
  </g>

  <!-- Granite 4 Nano ~350M -->
  <g>
    <circle cx="170" cy="405" r="9" fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
    <text x="60" y="395" fill="#16a34a" font-weight="600" font-size="11">Granite 4 Nano 350M</text>
  </g>

  <!-- Qwen3-Mini 1.7B -->
  <g>
    <circle cx="370" cy="385" r="9" fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
    <text x="385" y="375" fill="#16a34a" font-weight="600">Qwen3-Mini 1.7B</text>
  </g>

  <!-- Phi-5-Mini 3.5B -->
  <g>
    <circle cx="500" cy="350" r="10" fill="#9333ea" stroke="#581c87" stroke-width="1.5"/>
    <text x="515" y="354" fill="#9333ea" font-weight="600">Phi-5-Mini 3.5B</text>
  </g>

  <!-- Ministral 3B -->
  <g>
    <circle cx="480" cy="365" r="9" fill="#ea580c" stroke="#9a3412" stroke-width="1.5"/>
    <text x="495" y="335" fill="#ea580c" font-weight="600">Ministral 3B</text>
  </g>

  <!-- Phi-5 Medium 7B -->
  <g>
    <circle cx="620" cy="270" r="10" fill="#9333ea" stroke="#581c87" stroke-width="1.5"/>
    <text x="635" y="274" fill="#9333ea" font-weight="600">Phi-5 Medium 7B</text>
  </g>

  <!-- Ministral 8B -->
  <g>
    <circle cx="640" cy="290" r="10" fill="#ea580c" stroke="#9a3412" stroke-width="1.5"/>
    <text x="655" y="305" fill="#ea580c" font-weight="600">Ministral 8B</text>
  </g>

  <!-- Llama 4 Mini ~7B -->
  <g>
    <circle cx="620" cy="260" r="10" fill="#2563eb" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="500" y="245" fill="#2563eb" font-weight="600">Llama 4 Mini 7B</text>
  </g>

  <!-- Gemma 3 12B (deployable on workstation) -->
  <g>
    <circle cx="700" cy="200" r="10" fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
    <text x="715" y="204" fill="#16a34a" font-weight="600">Gemma 3 12B</text>
  </g>

  <!-- Qwen3 14B -->
  <g>
    <circle cx="720" cy="180" r="10" fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
    <text x="735" y="160" fill="#16a34a" font-weight="600">Qwen3 14B</text>
  </g>

  <!-- DeepSeek-V4-Lite ~16B / 2.4B active -->
  <g>
    <circle cx="430" cy="180" r="11" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="290" y="165" fill="#dc2626" font-weight="600">DeepSeek V4 Lite (16B/2.4B-A)</text>
  </g>

  <!-- Llama 4 Scout 17B-A -->
  <g>
    <circle cx="755" cy="120" r="11" fill="#2563eb" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="635" y="100" fill="#2563eb" font-weight="600">Llama 4 Scout (109B/17B-A)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80,18)">
    <circle cx="6" cy="6" r="6" fill="#16a34a"/><text x="18" y="10" fill="#6b7280">open-weight</text>
    <circle cx="120" cy="6" r="6" fill="#0ea5e9"/><text x="132" y="10" fill="#6b7280">Apple</text>
    <circle cx="200" cy="6" r="6" fill="#9333ea"/><text x="212" y="10" fill="#6b7280">Microsoft</text>
    <circle cx="300" cy="6" r="6" fill="#ea580c"/><text x="312" y="10" fill="#6b7280">Mistral</text>
    <circle cx="380" cy="6" r="6" fill="#2563eb"/><text x="392" y="10" fill="#6b7280">Meta</text>
    <circle cx="450" cy="6" r="6" fill="#dc2626"/><text x="462" y="10" fill="#6b7280">DeepSeek (MoE)</text>
  </g>
</svg>

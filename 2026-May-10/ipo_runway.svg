<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>2026 AI IPO runway: SpaceX/xAI · OpenAI · Anthropic</title>
  <desc>A timeline of expected public-listing windows and disclosed valuations for the three frontier-lab IPOs of 2026.</desc>

  <style>
    .bg { fill: none; }
    .axis { stroke: #94a3b8; stroke-width: 1; }
    .grid { stroke: #94a3b8; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.5; }
    .tick { fill: #475569; font-size: 11px; }
    .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
    .sub { font-size: 12px; fill: #475569; }
    .label-dark { fill: #0f172a; font-size: 12px; font-weight: 600; }
    .legend { font-size: 12px; fill: #334155; }
    .now-line { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 4 3; }
    .now-text { fill: #ef4444; font-size: 11px; font-weight: 700; }
    .spacex { fill: #fb923c; stroke: #9a3412; stroke-width: 1.5; }
    .openai { fill: #34d399; stroke: #047857; stroke-width: 1.5; }
    .anthropic { fill: #a78bfa; stroke: #5b21b6; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      .tick, .legend { fill: #cbd5e1; }
      .title { fill: #f1f5f9; }
      .sub { fill: #cbd5e1; }
      .axis { stroke: #475569; }
      .grid { stroke: #475569; }
      .label-dark { fill: #f1f5f9; }
    }
  </style>

  <rect class="bg" width="880" height="420"/>

  <text class="title" x="40" y="36">2026 frontier-lab IPO runway, by reported window and disclosed valuation</text>
  <text class="sub"   x="40" y="56">Aggregate target raise &gt; $240B. Sources: WSJ, TradingKey, KraneShares, Fortune, Winbuzzer (May 2026).</text>

  <g transform="translate(110, 100)">
    <line class="axis" x1="0" y1="200" x2="700" y2="200"/>

    <g>
      <line class="grid" x1="0"   y1="0" x2="0"   y2="200"/>
      <line class="grid" x1="100" y1="0" x2="100" y2="200"/>
      <line class="grid" x1="200" y1="0" x2="200" y2="200"/>
      <line class="grid" x1="300" y1="0" x2="300" y2="200"/>
      <line class="grid" x1="400" y1="0" x2="400" y2="200"/>
      <line class="grid" x1="500" y1="0" x2="500" y2="200"/>
      <line class="grid" x1="600" y1="0" x2="600" y2="200"/>
      <line class="grid" x1="700" y1="0" x2="700" y2="200"/>

      <text class="tick" x="0"   y="218" text-anchor="middle">May 26</text>
      <text class="tick" x="100" y="218" text-anchor="middle">Jun 26</text>
      <text class="tick" x="200" y="218" text-anchor="middle">Jul 26</text>
      <text class="tick" x="300" y="218" text-anchor="middle">Aug 26</text>
      <text class="tick" x="400" y="218" text-anchor="middle">Sep 26</text>
      <text class="tick" x="500" y="218" text-anchor="middle">Oct 26</text>
      <text class="tick" x="600" y="218" text-anchor="middle">Nov 26</text>
      <text class="tick" x="700" y="218" text-anchor="middle">Dec 26</text>
    </g>

    <line class="now-line" x1="32" y1="-12" x2="32" y2="208"/>
    <text class="now-text" x="36" y="-2">Today · May 10</text>

    <rect class="spacex" x="80" y="20" width="180" height="36" rx="6" ry="6"/>
    <text class="label-dark" x="170" y="44" text-anchor="middle">SpaceX/xAI · roadshow Jun 8</text>
    <text class="tick"      x="170" y="14" text-anchor="middle">$1.75T target valuation</text>

    <rect class="openai" x="510" y="80" width="160" height="36" rx="6" ry="6"/>
    <text class="label-dark" x="590" y="104" text-anchor="middle">OpenAI · Q4 list</text>
    <text class="tick"      x="590" y="74"  text-anchor="middle">$852B post-money (Mar) → IPO</text>

    <rect class="anthropic" x="540" y="140" width="150" height="36" rx="6" ry="6"/>
    <text class="label-dark" x="615" y="164" text-anchor="middle">Anthropic · Q4 list</text>
    <text class="tick"      x="615" y="134" text-anchor="middle">~$60B raise target</text>
  </g>

  <g transform="translate(80, 380)">
    <rect class="spacex"     x="0"   y="-10" width="14" height="14"/>
    <text class="legend"     x="20"  y="2">SpaceX (combined w/ xAI Feb 2026)</text>

    <rect class="openai"     x="280" y="-10" width="14" height="14"/>
    <text class="legend"     x="300" y="2">OpenAI</text>

    <rect class="anthropic"  x="400" y="-10" width="14" height="14"/>
    <text class="legend"     x="420" y="2">Anthropic</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 372" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Logarithmic price ladder of output cost in dollars per million tokens, July 23 2026. Open-weights models (teal, upper row): DeepSeek V4 Flash at 0.28 dollars, DeepSeek V4 Pro at 0.87 dollars, Inkling at 4.68 dollars, and Kimi K3 at 15 dollars. Closed or hosted-API models (slate-blue, lower row): Gemini 3.6 Flash at 7.50 dollars, GPT-5.6 Sol at 30 dollars, and Claude Fable 5 Pro credits at 50 dollars. The open-weights field now spans from a new sub-dollar floor at DeepSeek V4 Pro up to Kimi K3, undercutting the closed frontier by one to nearly two orders of magnitude, while Kimi K3 at 15 dollars sits above the cheapest closed option, Gemini 3.6 Flash.">
  <title>The open-weights price floor drops below a dollar — DeepSeek V4 Pro joins Inkling and Kimi K3</title>

  <!-- theme-neutral palette: saturated fills carry white text on light and dark; slate labels/axis read on both -->
  <text x="24" y="30" font-size="19" font-weight="700" fill="#64748b">The open-weights field now spans sub-$1 to near-frontier</text>
  <text x="24" y="50" font-size="12.5" fill="#94a3b8">Output price, $ per million tokens (log scale, lower = cheaper). List / API rates, Jul 23 2026.</text>

  <!-- log price axis: $0.1 -> $100 mapped x 110..810 ; x(v)=110+(log10(v)+1)*233.33 -->
  <line x1="110" y1="312" x2="810" y2="312" stroke="#94a3b8" stroke-width="1"/>
  <!-- gridlines + ticks at $0.1, $1, $10, $100 -->
  <line x1="110"   y1="88" x2="110"   y2="312" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="343.3" y1="88" x2="343.3" y2="312" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="576.7" y1="88" x2="576.7" y2="312" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="810"   y1="88" x2="810"   y2="312" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="110"   y="330" font-size="10.5" fill="#94a3b8" text-anchor="middle">$0.10</text>
  <text x="343.3" y="330" font-size="10.5" fill="#94a3b8" text-anchor="middle">$1</text>
  <text x="576.7" y="330" font-size="10.5" fill="#94a3b8" text-anchor="middle">$10</text>
  <text x="810"   y="330" font-size="10.5" fill="#94a3b8" text-anchor="middle">$100</text>
  <text x="460" y="352" font-size="11" fill="#94a3b8" text-anchor="middle">output price $/Mtok (log)</text>

  <!-- row labels -->
  <text x="24" y="132" font-size="12" font-weight="700" fill="#0d9488">Open weights</text>
  <text x="24" y="236" font-size="12" font-weight="700" fill="#1e40af">Closed / hosted API</text>

  <!-- ===== open-weights row (teal) y=150 ===== -->
  <!-- DeepSeek V4 Flash $0.28 -> x=214.3 -->
  <circle cx="214.3" cy="150" r="7" fill="#0d9488"/>
  <text x="214.3" y="140" font-size="10.5" font-weight="700" fill="#0d9488" text-anchor="middle">DeepSeek V4 Flash</text>
  <text x="214.3" y="172" font-size="9.5" fill="#94a3b8" text-anchor="middle">$0.28</text>
  <!-- DeepSeek V4 Pro $0.87 -> x=329.3 -->
  <circle cx="329.3" cy="150" r="8" fill="#0d9488"/>
  <text x="329.3" y="140" font-size="11" font-weight="700" fill="#0d9488" text-anchor="middle">DeepSeek V4 Pro</text>
  <text x="329.3" y="172" font-size="9.5" fill="#94a3b8" text-anchor="middle">$0.87 · MIT · day-one weights</text>
  <!-- Inkling $4.68 -> x=499.7 -->
  <circle cx="499.7" cy="150" r="8" fill="#0d9488"/>
  <text x="499.7" y="140" font-size="11" font-weight="700" fill="#0d9488" text-anchor="middle">Inkling</text>
  <text x="499.7" y="172" font-size="9.5" fill="#94a3b8" text-anchor="middle">$4.68 · Apache-2.0</text>
  <!-- Kimi K3 $15 -> x=617.8 -->
  <circle cx="617.8" cy="150" r="8" fill="#0d9488"/>
  <text x="617.8" y="140" font-size="11" font-weight="700" fill="#0d9488" text-anchor="middle">Kimi K3</text>
  <text x="617.8" y="172" font-size="9.5" fill="#94a3b8" text-anchor="middle">$15 · weights Jul 27</text>

  <!-- ===== closed / hosted row (slate-blue) y=254 ===== -->
  <!-- Gemini 3.6 Flash $7.50 -> x=547.5 -->
  <circle cx="547.5" cy="254" r="8" fill="#1e40af"/>
  <text x="547.5" y="244" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Gemini 3.6 Flash</text>
  <text x="547.5" y="276" font-size="9.5" fill="#94a3b8" text-anchor="middle">$7.50 · new Jul 21</text>
  <!-- GPT-5.6 Sol $30 -> x=688.0 -->
  <circle cx="688.0" cy="254" r="8" fill="#1e40af"/>
  <text x="688.0" y="244" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">GPT-5.6 Sol</text>
  <text x="688.0" y="276" font-size="9.5" fill="#94a3b8" text-anchor="middle">$30</text>
  <!-- Claude Fable 5 $50 -> x=739.8 -->
  <circle cx="739.8" cy="254" r="8" fill="#1e40af"/>
  <text x="739.8" y="244" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Claude Fable 5</text>
  <text x="739.8" y="276" font-size="9.5" fill="#94a3b8" text-anchor="middle">$50 · Pro credits</text>

  <!-- connector guides from row dots to axis (subtle) -->
  <line x1="329.3" y1="158" x2="329.3" y2="312" stroke="#0d9488" stroke-width="0.4" stroke-dasharray="2 3"/>
  <line x1="617.8" y1="158" x2="617.8" y2="312" stroke="#0d9488" stroke-width="0.4" stroke-dasharray="2 3"/>
</svg>

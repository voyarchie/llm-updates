<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Artificial Analysis Intelligence Index (peak) independent scores: Fable 5 60, Opus 4.8 56, GPT-5.5 xhigh 55, Opus 4.7 54, Claude Sonnet 5 53. Sonnet 5 ranks fifth yet costs 2.29 dollars per task versus Opus 4.8 at 1.97.">
  <title>Independent scores land: Sonnet 5 ranks 5th and costs more per task than Opus 4.8</title>

  <!-- theme-neutral palette: saturated fills carry white text; slate labels read on light and dark backgrounds -->
  <text x="30" y="34" font-size="19" font-weight="700" fill="#64748b">Independent read: Sonnet 5 sits 5th &#8212; and costs more per task than Opus 4.8</text>
  <text x="30" y="56" font-size="13" fill="#94a3b8">Artificial Analysis Intelligence Index, peak setting (higher = more capable). Cost/task in $ below.</text>

  <!-- gridlines + axis labels (value axis 0-65, baseline y=390, top y=100) -->
  <line x1="90" y1="390" x2="700" y2="390" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="90" y1="300.8" x2="700" y2="300.8" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="90" y1="211.5" x2="700" y2="211.5" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="90" y1="122.3" x2="700" y2="122.3" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="80" y="394" font-size="11" fill="#94a3b8" text-anchor="end">0</text>
  <text x="80" y="304.8" font-size="11" fill="#94a3b8" text-anchor="end">20</text>
  <text x="80" y="215.5" font-size="11" fill="#94a3b8" text-anchor="end">40</text>
  <text x="80" y="126.3" font-size="11" fill="#94a3b8" text-anchor="end">60</text>

  <!-- Fable 5: 60 -> top 122.3 -->
  <rect x="110" y="122.3" width="80" height="267.7" rx="4" fill="#16a34a"/>
  <text x="150" y="146" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">60</text>
  <text x="150" y="410" font-size="12" fill="#64748b" text-anchor="middle">Fable 5</text>
  <text x="150" y="426" font-size="10" fill="#94a3b8" text-anchor="middle">Anthropic</text>

  <!-- Opus 4.8: 56 -> top 140.1 -->
  <rect x="230" y="140.1" width="80" height="249.9" rx="4" fill="#2563eb"/>
  <text x="270" y="164" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">56</text>
  <text x="270" y="410" font-size="12" fill="#64748b" text-anchor="middle">Opus 4.8</text>
  <text x="270" y="426" font-size="10" fill="#94a3b8" text-anchor="middle">$1.97/task</text>

  <!-- GPT-5.5 xhigh: 55 -> top 144.6 -->
  <rect x="350" y="144.6" width="80" height="245.4" rx="4" fill="#64748b"/>
  <text x="390" y="168" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">55</text>
  <text x="390" y="410" font-size="12" fill="#64748b" text-anchor="middle">GPT-5.5</text>
  <text x="390" y="426" font-size="10" fill="#94a3b8" text-anchor="middle">xhigh</text>

  <!-- Opus 4.7: 54 -> top 149.0 -->
  <rect x="470" y="149.0" width="80" height="241.0" rx="4" fill="#3b82f6"/>
  <text x="510" y="172" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">54</text>
  <text x="510" y="410" font-size="12" fill="#64748b" text-anchor="middle">Opus 4.7</text>

  <!-- Sonnet 5: 53 -> top 153.5  (highlight) -->
  <rect x="590" y="153.5" width="80" height="236.5" rx="4" fill="#d97706"/>
  <text x="630" y="177" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">53</text>
  <text x="630" y="410" font-size="12" font-weight="700" fill="#d97706" text-anchor="middle">Sonnet 5</text>
  <text x="630" y="426" font-size="10" fill="#d97706" text-anchor="middle">$2.29/task</text>

  <text x="30" y="456" font-size="11" fill="#94a3b8">The cost inversion: Sonnet 5's new tokenizer emits ~1.3&#215; more tokens, so the "cheaper agent" runs a task for <tspan font-weight="700">more</tspan> than Opus 4.8 despite a lower score.</text>
</svg>

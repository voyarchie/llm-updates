<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 372" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Horizontal bar chart of the Artificial Analysis Intelligence Index for shipping models as of July 16, 2026. GPT-5.6 Sol (max) 59, Claude Opus 4.8 (max) 56, GPT-5.6 Terra (max) 55, Google Gemini 3.5 Flash 55, Grok 4.5 (high) 54, Meta Muse Spark 1.1 (xhigh) 51, GPT-5.6 Luna (max) 51. A dashed reference line marks the gated Claude Fable 5 configuration at 60. Gemini 3.5 Flash at 55 sits above Muse Spark 1.1 at 51, showing Google is present on the board even though its flagship Gemini 3.5 Pro has not shipped.">
  <title>Shipping-model Intelligence Index as of Jul 16, 2026 — Google is on the board via Flash</title>

  <!-- theme-neutral palette: saturated fills + slate labels read on both light and dark; no white background assumed -->
  <text x="24" y="30" font-size="19" font-weight="700" fill="#64748b">Google is on the board — via Flash, not the flagship</text>
  <text x="24" y="50" font-size="12.5" fill="#94a3b8">Artificial Analysis Intelligence Index, shipping models, Jul 16 2026. Gemini 3.5 Pro (flagship) still unshipped.</text>

  <!-- scale: barX0 = 210, pxPerPoint = 42, index axis 48..61 -->
  <!-- x gridlines at index 50, 55, 60 -->
  <line x1="294" y1="72" x2="294" y2="330" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="504" y1="72" x2="504" y2="330" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="714" y1="72" x2="714" y2="330" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="294" y="348" font-size="10.5" fill="#94a3b8" text-anchor="middle">50</text>
  <text x="504" y="348" font-size="10.5" fill="#94a3b8" text-anchor="middle">55</text>
  <text x="714" y="348" font-size="10.5" fill="#94a3b8" text-anchor="middle">60</text>
  <text x="462" y="366" font-size="11" fill="#94a3b8" text-anchor="middle">Artificial Analysis Intelligence Index</text>

  <!-- Fable 5 (gated) reference line at index 60 -> x = 210 + 12*42 = 714 -->
  <line x1="714" y1="72" x2="714" y2="330" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="708" y="86" font-size="10.5" font-weight="600" fill="#7c3aed" text-anchor="end">Fable 5 (gated) 60</text>

  <!-- rows: y start 92, step 34, bar height 20 -->
  <!-- GPT-5.6 Sol (max) 59 -> len (59-48)*42=462, end 672 -->
  <text x="196" y="107" font-size="12" fill="#64748b" text-anchor="end">GPT-5.6 Sol (max)</text>
  <rect x="210" y="92" width="462" height="20" rx="3" fill="#64748b"/>
  <text x="680" y="107" font-size="11" font-weight="700" fill="#64748b" text-anchor="start">59</text>

  <!-- Opus 4.8 (max) 56 -> len 336, end 546 -->
  <text x="196" y="141" font-size="12" fill="#64748b" text-anchor="end">Claude Opus 4.8 (max)</text>
  <rect x="210" y="126" width="336" height="20" rx="3" fill="#64748b"/>
  <text x="554" y="141" font-size="11" font-weight="700" fill="#64748b" text-anchor="start">56</text>

  <!-- GPT-5.6 Terra (max) 55 -> len 294, end 504 -->
  <text x="196" y="175" font-size="12" fill="#64748b" text-anchor="end">GPT-5.6 Terra (max)</text>
  <rect x="210" y="160" width="294" height="20" rx="3" fill="#64748b"/>
  <text x="512" y="175" font-size="11" font-weight="700" fill="#64748b" text-anchor="start">55</text>

  <!-- Gemini 3.5 Flash 55 -> highlight sky -->
  <text x="196" y="209" font-size="12" font-weight="700" fill="#0ea5e9" text-anchor="end">Google Gemini 3.5 Flash</text>
  <rect x="210" y="194" width="294" height="20" rx="3" fill="#0ea5e9"/>
  <text x="512" y="209" font-size="11" font-weight="700" fill="#0ea5e9" text-anchor="start">55</text>

  <!-- Grok 4.5 (high) 54 -> len 252, end 462 -->
  <text x="196" y="243" font-size="12" fill="#64748b" text-anchor="end">Grok 4.5 (high)</text>
  <rect x="210" y="228" width="252" height="20" rx="3" fill="#64748b"/>
  <text x="470" y="243" font-size="11" font-weight="700" fill="#64748b" text-anchor="start">54</text>

  <!-- Muse Spark 1.1 (xhigh) 51: len 126, end 336; amber, the Jul-15 comparison anchor -->
  <text x="196" y="277" font-size="12" font-weight="700" fill="#d97706" text-anchor="end">Meta Muse Spark 1.1</text>
  <rect x="210" y="262" width="126" height="20" rx="3" fill="#d97706"/>
  <text x="344" y="277" font-size="11" font-weight="700" fill="#d97706" text-anchor="start">51</text>

  <!-- GPT-5.6 Luna (max) 51 -> len 126, end 336 -->
  <text x="196" y="311" font-size="12" fill="#64748b" text-anchor="end">GPT-5.6 Luna (max)</text>
  <rect x="210" y="296" width="126" height="20" rx="3" fill="#64748b"/>
  <text x="344" y="311" font-size="11" font-weight="700" fill="#64748b" text-anchor="start">51</text>
</svg>

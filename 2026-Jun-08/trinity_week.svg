<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="Three weeks of frontier-lab news, May 18 to June 8 2026" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <title>Three weeks of frontier news — Google I/O, Claude Opus 4.8, Anthropic S-1, WWDC</title>

  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#9ca3af">The big-three sprint — May 18 to June 8, 2026</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#9ca3af">Google, Anthropic and Apple each printed a flagship moment three weeks apart</text>

  <!-- Timeline axis -->
  <line x1="60" y1="170" x2="700" y2="170" stroke="#9ca3af" stroke-width="2" opacity="0.6"/>
  <g fill="#9ca3af" font-size="10" text-anchor="middle" opacity="0.8">
    <text x="60"  y="195">May 18</text>
    <text x="700" y="195">Jun 8</text>
  </g>

  <!-- May 19: Google I/O (above) -->
  <line x1="90" y1="170" x2="90" y2="110" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
  <circle cx="90" cy="170" r="5" fill="#2563eb"/>
  <rect x="40" y="62" width="170" height="50" rx="6" fill="#2563eb" opacity="0.14" stroke="#2563eb" stroke-width="1"/>
  <text x="125" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">May 19 · Google I/O</text>
  <text x="125" y="96" text-anchor="middle" font-size="10" fill="#2563eb">Gemini 3.5 Flash · Omni</text>
  <text x="125" y="108" text-anchor="middle" font-size="10" fill="#2563eb">Spark · Gemini for Science</text>

  <!-- May 28: Claude Opus 4.8 (below) -->
  <line x1="365" y1="170" x2="365" y2="228" stroke="#d97706" stroke-width="1.5" opacity="0.7"/>
  <circle cx="365" cy="170" r="5" fill="#d97706"/>
  <rect x="282" y="228" width="166" height="50" rx="6" fill="#d97706" opacity="0.14" stroke="#d97706" stroke-width="1"/>
  <text x="365" y="246" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">May 28 · Claude Opus 4.8</text>
  <text x="365" y="262" text-anchor="middle" font-size="10" fill="#d97706">new #1 · SWE-Bench Pro 69.2%</text>
  <text x="365" y="274" text-anchor="middle" font-size="10" fill="#d97706">dynamic workflows · 3x cheaper fast</text>

  <!-- Jun 1: Anthropic S-1 (above) -->
  <line x1="486" y1="170" x2="486" y2="110" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <circle cx="486" cy="170" r="5" fill="#7c3aed"/>
  <rect x="404" y="62" width="166" height="50" rx="6" fill="#7c3aed" opacity="0.14" stroke="#7c3aed" stroke-width="1"/>
  <text x="487" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Jun 1 · Anthropic S-1</text>
  <text x="487" y="96" text-anchor="middle" font-size="10" fill="#7c3aed">confidential IPO filing</text>
  <text x="487" y="108" text-anchor="middle" font-size="10" fill="#7c3aed">$65B Series H · ~$965B</text>

  <!-- Jun 8: WWDC (below) -->
  <line x1="700" y1="170" x2="700" y2="228" stroke="#059669" stroke-width="1.5" opacity="0.7"/>
  <circle cx="700" cy="170" r="5" fill="#059669"/>
  <rect x="566" y="228" width="172" height="50" rx="6" fill="#059669" opacity="0.14" stroke="#059669" stroke-width="1"/>
  <text x="652" y="246" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">Jun 8 · Apple WWDC</text>
  <text x="652" y="262" text-anchor="middle" font-size="10" fill="#059669">Gemini-powered Siri (~$1B/yr)</text>
  <text x="652" y="274" text-anchor="middle" font-size="10" fill="#059669">iOS 27 · Cook's last keynote</text>

  <text x="60" y="306" font-size="10" fill="#9ca3af" opacity="0.85">Sources: blog.google I/O 2026, Anthropic news, TechCrunch, CNBC. Dates in Los Angeles time.</text>

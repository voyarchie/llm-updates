<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <title>Omni-modal architecture pattern (April 2026)</title>
  <desc>Single shared transformer with per-modality encoders and unified KV cache, exemplified by Qwen3.5-Omni and Nemotron 3 Nano Omni</desc>

  <!-- Layer rail labels -->
  <g font-size="12" fill="#64748b">
    <text x="14" y="60">INPUT MODALITIES</text>
    <text x="14" y="160">PER-MODALITY ENCODERS</text>
    <text x="14" y="270">SHARED TRANSFORMER</text>
    <text x="14" y="400">OUTPUT</text>
  </g>

  <!-- INPUT MODALITIES (row 1) -->
  <g>
    <rect x="120" y="34" width="140" height="48" rx="9" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="190" y="64" text-anchor="middle" fill="#2563eb" font-weight="700">Text</text>

    <rect x="290" y="34" width="140" height="48" rx="9" fill="none" stroke="#16a34a" stroke-width="2.2"/>
    <text x="360" y="64" text-anchor="middle" fill="#16a34a" font-weight="700">Image</text>

    <rect x="460" y="34" width="140" height="48" rx="9" fill="none" stroke="#9333ea" stroke-width="2.2"/>
    <text x="530" y="64" text-anchor="middle" fill="#9333ea" font-weight="700">Audio</text>

    <rect x="630" y="34" width="140" height="48" rx="9" fill="none" stroke="#ea580c" stroke-width="2.2"/>
    <text x="700" y="64" text-anchor="middle" fill="#ea580c" font-weight="700">Video</text>
  </g>

  <!-- PER-MODALITY ENCODERS (row 2) -->
  <g>
    <rect x="120" y="120" width="140" height="64" rx="9" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="190" y="148" text-anchor="middle" fill="#2563eb" font-weight="700">BPE / SentencePiece</text>
    <text x="190" y="168" text-anchor="middle" fill="#475569" font-size="11">tokenizer</text>

    <rect x="290" y="120" width="140" height="64" rx="9" fill="none" stroke="#16a34a" stroke-width="2.2"/>
    <text x="360" y="148" text-anchor="middle" fill="#16a34a" font-weight="700">Vision encoder</text>
    <text x="360" y="168" text-anchor="middle" fill="#475569" font-size="11">patches → tokens</text>

    <rect x="460" y="120" width="140" height="64" rx="9" fill="none" stroke="#9333ea" stroke-width="2.2"/>
    <text x="530" y="148" text-anchor="middle" fill="#9333ea" font-weight="700">Audio encoder</text>
    <text x="530" y="168" text-anchor="middle" fill="#475569" font-size="11">log-mel → tokens</text>

    <rect x="630" y="120" width="140" height="64" rx="9" fill="none" stroke="#ea580c" stroke-width="2.2"/>
    <text x="700" y="148" text-anchor="middle" fill="#ea580c" font-weight="700">Video encoder</text>
    <text x="700" y="168" text-anchor="middle" fill="#475569" font-size="11">spatiotemporal tokens</text>
  </g>

  <!-- SHARED TRANSFORMER (row 3) -->
  <g>
    <rect x="120" y="225" width="650" height="98" rx="14" fill="none" stroke="#0f766e" stroke-width="2.6"/>
    <text x="445" y="258" text-anchor="middle" fill="#0f766e" font-weight="800" font-size="15">Single shared transformer</text>
    <text x="445" y="280" text-anchor="middle" fill="#475569" font-size="12">unified token stream · cross-modal attention · joint latent space</text>
    <text x="445" y="302" text-anchor="middle" fill="#475569" font-size="12">unified KV cache (256K context · video at 1 FPS · 10h+ audio)</text>
  </g>

  <!-- OUTPUT (row 4) -->
  <g>
    <rect x="220" y="365" width="200" height="56" rx="9" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="320" y="392" text-anchor="middle" fill="#2563eb" font-weight="700">Text decoder</text>
    <text x="320" y="410" text-anchor="middle" fill="#475569" font-size="11">tokens → text</text>

    <rect x="470" y="365" width="200" height="56" rx="9" fill="none" stroke="#9333ea" stroke-width="2.2"/>
    <text x="570" y="392" text-anchor="middle" fill="#9333ea" font-weight="700">Speech decoder</text>
    <text x="570" y="410" text-anchor="middle" fill="#475569" font-size="11">tokens → audio</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Inputs → encoders -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <line x1="190" y1="84" x2="190" y2="118"/>
    <line x1="360" y1="84" x2="360" y2="118"/>
    <line x1="530" y1="84" x2="530" y2="118"/>
    <line x1="700" y1="84" x2="700" y2="118"/>
  </g>

  <!-- Encoders → shared transformer -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <line x1="190" y1="186" x2="190" y2="223"/>
    <line x1="360" y1="186" x2="360" y2="223"/>
    <line x1="530" y1="186" x2="530" y2="223"/>
    <line x1="700" y1="186" x2="700" y2="223"/>
  </g>

  <!-- Transformer → output decoders -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <line x1="320" y1="325" x2="320" y2="363"/>
    <line x1="570" y1="325" x2="570" y2="363"/>
  </g>

  <!-- Footnote -->
  <g font-size="11" fill="#64748b">
    <text x="120" y="445">Pattern: every encoder emits tokens into a single shared sequence; cross-modal attention happens inside one transformer, not relayed via text.</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <title>April 2026 AI coding harness stack</title>
  <desc>Convergent layering of frontier models, harnesses, and IDEs in April 2026</desc>

  <!-- Layer labels (left rail) -->
  <g font-size="12" fill="#64748b">
    <text x="14" y="80">SURFACE</text>
    <text x="14" y="200">HARNESS</text>
    <text x="14" y="320">FRONTIER MODEL</text>
    <text x="14" y="440">EXECUTION</text>
  </g>

  <!-- SURFACE: IDEs / clients -->
  <g>
    <rect x="120" y="50" width="160" height="64" rx="10" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="200" y="78" text-anchor="middle" fill="#2563eb" font-weight="700">Cursor 3</text>
    <text x="200" y="98" text-anchor="middle" fill="#475569" font-size="11">parallel agent tabs · cloud VMs</text>

    <rect x="300" y="50" width="160" height="64" rx="10" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="380" y="78" text-anchor="middle" fill="#2563eb" font-weight="700">VS Code · JetBrains</text>
    <text x="380" y="98" text-anchor="middle" fill="#475569" font-size="11">Copilot agent mode</text>

    <rect x="480" y="50" width="160" height="64" rx="10" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="560" y="78" text-anchor="middle" fill="#2563eb" font-weight="700">Terminal</text>
    <text x="560" y="98" text-anchor="middle" fill="#475569" font-size="11">interactive · scriptable</text>

    <rect x="660" y="50" width="160" height="64" rx="10" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="740" y="78" text-anchor="middle" fill="#2563eb" font-weight="700">Web · Mobile</text>
    <text x="740" y="98" text-anchor="middle" fill="#475569" font-size="11">claude.ai/code · ChatGPT</text>
  </g>

  <!-- HARNESS layer -->
  <g>
    <rect x="120" y="170" width="220" height="64" rx="10" fill="none" stroke="#ea580c" stroke-width="2.2"/>
    <text x="230" y="198" text-anchor="middle" fill="#ea580c" font-weight="700">Claude Code</text>
    <text x="230" y="218" text-anchor="middle" fill="#475569" font-size="11">subagents · hooks · MCP · slash skills</text>

    <rect x="360" y="170" width="220" height="64" rx="10" fill="none" stroke="#ea580c" stroke-width="2.2"/>
    <text x="470" y="198" text-anchor="middle" fill="#ea580c" font-weight="700">OpenAI Codex CLI</text>
    <text x="470" y="218" text-anchor="middle" fill="#475569" font-size="11">multi-surface · plugin in Claude Code</text>

    <rect x="600" y="170" width="220" height="64" rx="10" fill="none" stroke="#ea580c" stroke-width="2.2"/>
    <text x="710" y="198" text-anchor="middle" fill="#ea580c" font-weight="700">Gemini CLI · OpenCode · Aider</text>
    <text x="710" y="218" text-anchor="middle" fill="#475569" font-size="11">provider-agnostic / open</text>
  </g>

  <!-- FRONTIER MODEL layer -->
  <g>
    <rect x="120" y="290" width="170" height="64" rx="10" fill="none" stroke="#16a34a" stroke-width="2.2"/>
    <text x="205" y="318" text-anchor="middle" fill="#16a34a" font-weight="700">GPT-5.5 / Pro</text>
    <text x="205" y="338" text-anchor="middle" fill="#475569" font-size="11">AAII 60 · TB2 82.7%</text>

    <rect x="305" y="290" width="170" height="64" rx="10" fill="none" stroke="#16a34a" stroke-width="2.2"/>
    <text x="390" y="318" text-anchor="middle" fill="#16a34a" font-weight="700">Claude Opus 4.7</text>
    <text x="390" y="338" text-anchor="middle" fill="#475569" font-size="11">SWE-Bench Pro 64.3%</text>

    <rect x="490" y="290" width="170" height="64" rx="10" fill="none" stroke="#16a34a" stroke-width="2.2"/>
    <text x="575" y="318" text-anchor="middle" fill="#16a34a" font-weight="700">Gemini 3.1 Pro</text>
    <text x="575" y="338" text-anchor="middle" fill="#475569" font-size="11">2M context · GPQA 94.3%</text>

    <rect x="675" y="290" width="170" height="64" rx="10" fill="none" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="4 3"/>
    <text x="760" y="318" text-anchor="middle" fill="#16a34a" font-weight="700">DeepSeek V4-Pro</text>
    <text x="760" y="338" text-anchor="middle" fill="#475569" font-size="11">open · 1.6T MoE · 49B active</text>
  </g>

  <!-- EXECUTION layer -->
  <g>
    <rect x="120" y="410" width="220" height="64" rx="10" fill="none" stroke="#9333ea" stroke-width="2.2"/>
    <text x="230" y="438" text-anchor="middle" fill="#9333ea" font-weight="700">Sandbox · Worktree</text>
    <text x="230" y="458" text-anchor="middle" fill="#475569" font-size="11">isolated branch / cloud VM</text>

    <rect x="360" y="410" width="220" height="64" rx="10" fill="none" stroke="#9333ea" stroke-width="2.2"/>
    <text x="470" y="438" text-anchor="middle" fill="#9333ea" font-weight="700">Tools (MCP)</text>
    <text x="470" y="458" text-anchor="middle" fill="#475569" font-size="11">git · github · shell · browser</text>

    <rect x="600" y="410" width="220" height="64" rx="10" fill="none" stroke="#9333ea" stroke-width="2.2"/>
    <text x="710" y="438" text-anchor="middle" fill="#9333ea" font-weight="700">CI · Tests · Type-check</text>
    <text x="710" y="458" text-anchor="middle" fill="#475569" font-size="11">verifiable signal · loop until green</text>
  </g>

  <!-- Connectors -->
  <g stroke="#94a3b8" stroke-width="1.4" fill="none">
    <line x1="200" y1="114" x2="230" y2="170"/>
    <line x1="380" y1="114" x2="380" y2="170"/>
    <line x1="560" y1="114" x2="470" y2="170"/>
    <line x1="740" y1="114" x2="710" y2="170"/>

    <line x1="230" y1="234" x2="205" y2="290"/>
    <line x1="230" y1="234" x2="390" y2="290"/>
    <line x1="470" y1="234" x2="205" y2="290"/>
    <line x1="470" y1="234" x2="575" y2="290"/>
    <line x1="710" y1="234" x2="575" y2="290"/>
    <line x1="710" y1="234" x2="760" y2="290"/>

    <line x1="205" y1="354" x2="230" y2="410"/>
    <line x1="390" y1="354" x2="470" y2="410"/>
    <line x1="575" y1="354" x2="470" y2="410"/>
    <line x1="760" y1="354" x2="710" y2="410"/>
  </g>

  <!-- Footer note -->
  <g font-size="11" fill="#64748b">
    <text x="120" y="510">Dashed border = open-weight model. Mid-tone borders &amp; transparent fills are legible on light and dark backgrounds.</text>
  </g>
</svg>

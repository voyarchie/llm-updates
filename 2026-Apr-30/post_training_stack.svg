<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="sft" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dbe9ff"/>
      <stop offset="1" stop-color="#aac3f5"/>
    </linearGradient>
    <linearGradient id="pref" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dff1d8"/>
      <stop offset="1" stop-color="#a4d199"/>
    </linearGradient>
    <linearGradient id="rl" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe8cf"/>
      <stop offset="1" stop-color="#f0b074"/>
    </linearGradient>
    <linearGradient id="safety" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fadbdb"/>
      <stop offset="1" stop-color="#e69b9b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="700">2026 LLM Post-Training Stack</text>
  <text x="460" y="48" text-anchor="middle" fill="#555">Modular pipeline: SFT → Preference Optimization → Verifiable-Reward RL → Safety Layer</text>

  <g>
    <rect x="40" y="90" width="190" height="180" rx="14" fill="url(#sft)" stroke="#3a66ff"/>
    <text x="135" y="118" text-anchor="middle" font-weight="700">1. Supervised Fine-Tune</text>
    <text x="135" y="142" text-anchor="middle" fill="#222">Instruction following</text>
    <text x="135" y="162" text-anchor="middle" fill="#222">+ tool-call format</text>
    <text x="135" y="190" text-anchor="middle" font-size="12" fill="#444">Method: SFT</text>
    <text x="135" y="208" text-anchor="middle" font-size="12" fill="#444">Multi-turn dialogue</text>
    <text x="135" y="226" text-anchor="middle" font-size="12" fill="#444">Synthetic + curated</text>
    <text x="135" y="252" text-anchor="middle" font-size="11" fill="#333" font-style="italic">Cheap; sets behavior shape</text>
  </g>

  <g>
    <rect x="250" y="90" width="190" height="180" rx="14" fill="url(#pref)" stroke="#2c8a3a"/>
    <text x="345" y="118" text-anchor="middle" font-weight="700">2. Preference Opt.</text>
    <text x="345" y="142" text-anchor="middle" fill="#222">Aligns to taste</text>
    <text x="345" y="162" text-anchor="middle" fill="#222">without separate RM</text>
    <text x="345" y="190" text-anchor="middle" font-size="12" fill="#444">DPO  •  SimPO</text>
    <text x="345" y="208" text-anchor="middle" font-size="12" fill="#444">KTO (binary feedback)</text>
    <text x="345" y="226" text-anchor="middle" font-size="12" fill="#444">ORPO (one-pass)</text>
    <text x="345" y="252" text-anchor="middle" font-size="11" fill="#333" font-style="italic">SimPO ≈ +6.4 vs DPO</text>
  </g>

  <g>
    <rect x="460" y="90" width="190" height="180" rx="14" fill="url(#rl)" stroke="#d68a1a"/>
    <text x="555" y="118" text-anchor="middle" font-weight="700">3. Verifiable-Reward RL</text>
    <text x="555" y="142" text-anchor="middle" fill="#222">Reasoning &amp; agency</text>
    <text x="555" y="162" text-anchor="middle" fill="#222">programmatic checks</text>
    <text x="555" y="190" text-anchor="middle" font-size="12" fill="#444">RLVR  •  GRPO</text>
    <text x="555" y="208" text-anchor="middle" font-size="12" fill="#444">DAPO  •  Flow-GRPO</text>
    <text x="555" y="226" text-anchor="middle" font-size="12" fill="#444">No critic network</text>
    <text x="555" y="252" text-anchor="middle" font-size="11" fill="#333" font-style="italic">MIT rollout speedup 2–3×</text>
  </g>

  <g>
    <rect x="670" y="90" width="210" height="180" rx="14" fill="url(#safety)" stroke="#b03030"/>
    <text x="775" y="118" text-anchor="middle" font-weight="700">4. Safety Layer</text>
    <text x="775" y="142" text-anchor="middle" fill="#222">Plan-Check-Act-or-Refuse</text>
    <text x="775" y="162" text-anchor="middle" fill="#222">+ in-decoding probing</text>
    <text x="775" y="190" text-anchor="middle" font-size="12" fill="#444">MOSAIC (Mar 2026)</text>
    <text x="775" y="208" text-anchor="middle" font-size="12" fill="#444">SAP, ProAct, Rapid-Resp.</text>
    <text x="775" y="226" text-anchor="middle" font-size="12" fill="#444">Cyber classifiers gating</text>
    <text x="775" y="252" text-anchor="middle" font-size="11" fill="#333" font-style="italic">~50% harm reduction (MOSAIC)</text>
  </g>

  <line x1="230" y1="180" x2="250" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="180" x2="460" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="180" x2="670" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <g font-size="12" fill="#222">
    <text x="40" y="310" font-weight="700">Default 2026 recipe:</text>
    <text x="40" y="328">SFT → DPO/SimPO → GRPO/DAPO with verifiable rewards → MOSAIC-style refusal training + in-decoding probes.</text>
    <text x="40" y="346">Frontier labs add: gated previews for high-risk capability (e.g. Mythos, GPT-5.5-Cyber) and run-time cyber classifiers.</text>
  </g>
</svg>
